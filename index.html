  function _pickEmoji(emoji, el) {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('ce-icon').value = emoji;
    _updatePreview();
  }

  function _pickColor(color, el) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('ce-color').value = color;
    _updatePreview();
  }

  function _updatePreview() {
    const icon  = document.getElementById('ce-icon')  ? document.getElementById('ce-icon').value  : '📌';
    const color = document.getElementById('ce-color') ? document.getElementById('ce-color').value : '#9E9E9E';
    const prev  = document.getElementById('cat-preview');
    if (prev) {
      prev.textContent = icon;
      prev.style.background = color + '22';
      prev.style.borderColor = color + '44';
    }
  }

  async function save() {
    const name  = (document.getElementById('ce-name').value || '').trim();
    const type  = document.getElementById('ce-type').value;
    const icon  = document.getElementById('ce-icon').value  || '📌';
    const color = document.getElementById('ce-color').value || '#9E9E9E';

    if (!name) return UI.toast('Enter a category name', 'error');

    const id  = _editingId || ('c-' + Utils.uid());
    const cat = { id, name, type, icon, color };

    // Update in-memory list and DB
    CATS._updateOrAdd(cat);
    await DB.put('categories', cat);

    UI.closeModal('catedit');
    UI.toast(_editingId ? 'Category updated' : 'Category added', 'success');

    // Refresh list if still open
    const catmgrEl = document.getElementById('modal-catmgr');
    if (catmgrEl && catmgrEl.classList.contains('open')) openList();

    App.rerender();
  }

  async function deleteCat(catId) {
    // Check if any transactions use this category
    const inUse = State.transactions.some(t => t.categoryId === catId);
    if (inUse) {
      if (!confirm('Transactions using this category will be moved to "Miscellaneous". Continue?')) return;
      // Remap transactions
      const affected = State.transactions.filter(t => t.categoryId === catId);
      for (const t of affected) {
        t.categoryId = 'c-mx';
        await DB.put('transactions', t);
      }
    }
    CATS._remove(catId);
    await DB.remove('categories', catId);
    UI.closeModal('catedit');
    UI.toast('Category deleted', 'info');

    // Refresh list
    const catmgrEl = document.getElementById('modal-catmgr');
    if (catmgrEl && catmgrEl.classList.contains('open')) openList();
    App.rerender();
  }

  return { openList, openEdit, save, deleteCat, _pickType, _pickEmoji, _pickColor };
})();


/* ═══════════════════════════════════════════════════════════════
   PHASE 4 — CATS module extension
   Adds mutable operations on the category list (used by CatMgr).
   ═══════════════════════════════════════════════════════════════ */
// Patch CATS to support mutation (categories were read-only in Phase 1)
(function patchCATS() {
  // Expose the internal list reference so CatMgr can mutate it
  const _list = CATS.getAll();  // this IS the live array (same reference)

  CATS._updateOrAdd = function(cat) {
    const idx = _list.findIndex(c => c.id === cat.id);
    if (idx >= 0) _list[idx] = cat;
    else _list.push(cat);
    // Refresh byId lookup
    CATS._rebuildIndex();
  };

  CATS._remove = function(id) {
    const idx = _list.findIndex(c => c.id === id);
    if (idx >= 0) _list.splice(idx, 1);
    CATS._rebuildIndex();
  };

  CATS._rebuildIndex = function() {
    // The byId map is internal — rebuild NAME_TO_ID mapping
    // (CATS.get() uses the byId object; we patch it via closure trick)
    // Since byId is a const inside IIFE, we patch via override
    const newMap = {};
    _list.forEach(c => newMap[c.id] = c);
    Object.assign(CATS._byIdRef, newMap);
    // Clear keys not in new map
    for (const k of Object.keys(CATS._byIdRef)) {
      if (!newMap[k]) delete CATS._byIdRef[k];
    }
  };

  // Expose the byId object so _rebuildIndex can patch it
  // We do this by wrapping CATS.get to use a patchable object
  CATS._byIdRef = {};
  _list.forEach(c => CATS._byIdRef[c.id] = c);
  const _origGet = CATS.get;
  CATS.get = function(id) {
    return CATS._byIdRef[id] || { id: 'c-mx', name: 'Miscellaneous', icon: '📌', type: 'expense', color: '#9E9E9E' };
  };
})();



/* ═══════════════════════════════════════════════════════════════
   PHASE 4 — TRANSACTION SEARCH
   Injects search bar into Transactions screen and filters results.
   ═══════════════════════════════════════════════════════════════ */
(function patchTxSearch() {
  const _origRender = Screens.tx.render.bind(Screens.tx);

  Screens.tx.render = function() {
    _origRender();

    // Inject search bar after filter-row
    const scr = document.getElementById('tx-content');
    if (!scr) return;

    const hdr = scr.querySelector('.screen-hdr');
    if (!hdr) return;

    // Add search icon to header actions
    const addBtn = hdr.querySelector('.icon-btn');
    if (addBtn && !hdr.querySelector('#tx-search-btn')) {
      const searchBtn = document.createElement('div');
      searchBtn.className = 'icon-btn';
      searchBtn.id = 'tx-search-btn';
      searchBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--tx2);fill:none;stroke-width:1.8;stroke-linecap:round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>`;
      searchBtn.onclick = () => Screens.tx.toggleSearch();
      addBtn.parentNode.insertBefore(searchBtn, addBtn);
    }

    // Inject search bar wrap before filter-row
    const filterRow = scr.querySelector('.filter-row');
    if (filterRow && !scr.querySelector('#tx-search-bar-wrap')) {
      const wrap = document.createElement('div');
      wrap.className = 'search-bar-wrap' + (State.searchQuery ? ' open' : '');
      wrap.id = 'tx-search-bar-wrap';
      wrap.innerHTML = `
        <div class="search-input-wrap">
          <span class="search-icon-prefix">🔍</span>
          <input class="search-input" id="tx-search-input" type="search"
                 placeholder="Search transactions…"
                 value="${escHtml(State.searchQuery || '')}"
                 oninput="Screens.tx.onSearch(this.value)"
                 autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="btn-ghost btn-sm" onclick="Screens.tx.clearSearch()">Cancel</button>
      `;
      scr.insertBefore(wrap, filterRow);
    }

    // If there's an active search query, apply it
    if (State.searchQuery) this._applySearch(State.searchQuery);
  };

  Screens.tx.toggleSearch = function() {
    const wrap = document.getElementById('tx-search-bar-wrap');
    if (!wrap) return;
    const isOpen = wrap.classList.contains('open');
    if (isOpen) {
      this.clearSearch();
    } else {
      wrap.classList.add('open');
      setTimeout(() => document.getElementById('tx-search-input') && document.getElementById('tx-search-input').focus(), 300);
    }
  };

  Screens.tx._searchTimer = null;
  Screens.tx.onSearch = function(q) {
    clearTimeout(this._searchTimer);
    this._searchTimer = setTimeout(() => {
      State.searchQuery = q.trim();
      if (!q.trim()) {
        this._clearSearchResults();
        return;
      }
      this._applySearch(q.trim());
    }, 180);
  };

  Screens.tx._applySearch = function(q) {
    const ql = q.toLowerCase();
    const allTx = State.transactions.filter(t => {
      return (t.merchant  || '').toLowerCase().includes(ql) ||
             (t.description || '').toLowerCase().includes(ql) ||
             (t.notes      || '').toLowerCase().includes(ql) ||
             String(t.amount).includes(ql) ||
             (CATS.get(t.categoryId).name || '').toLowerCase().includes(ql);
    }).sort((a, b) => b.date.localeCompare(a.date));

    const filterRow = document.querySelector('#tx-content .filter-row');
    if (filterRow) filterRow.style.display = 'none';

    // Replace everything after search bar with results
    const wrap = document.getElementById('tx-search-bar-wrap');
    if (!wrap) return;

    // Remove existing result nodes
    let node = wrap.nextSibling;
    while (node) {
      const next = node.nextSibling;
      if (node.id !== 'tx-search-result-area') node.parentNode && node.parentNode.removeChild(node);
      node = next;
    }

    const resultArea = document.createElement('div');
    resultArea.id = 'tx-search-result-area';

    if (allTx.length === 0) {
      resultArea.innerHTML = `<div class="empty-state" style="padding:40px 24px">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No results</div>
        <div class="empty-body">No transactions match "<b>${escHtml(q)}</b>"</div>
      </div>`;
    } else {
      // Group by date
      const groups = {};
      allTx.forEach(t => { groups[t.date] = groups[t.date] || []; groups[t.date].push(t); });
      const sorted = Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
      resultArea.innerHTML = `
        <div class="search-result-lbl">${allTx.length} result${allTx.length!==1?'s':''} for "${escHtml(q)}"</div>
        ${sorted.map(([date, txs]) => `
          <div class="sec-label" style="margin-top:4px">${Utils.fmtDate(date)}</div>
          <div class="card" style="padding:0">
            <div class="tx-list">${txs.map(t => renderTxRow(t)).join('')}</div>
          </div>`).join('')}
        <div class="bottom-space"></div>`;
    }

    wrap.parentNode && wrap.parentNode.appendChild(resultArea);
  };

  Screens.tx._clearSearchResults = function() {
    State.searchQuery = '';
    const area = document.getElementById('tx-search-result-area');
    if (area) area.remove();
    const filterRow = document.querySelector('#tx-content .filter-row');
    if (filterRow) filterRow.style.display = '';
  };

  Screens.tx.clearSearch = function() {
    State.searchQuery = '';
    const wrap = document.getElementById('tx-search-bar-wrap');
    if (wrap) wrap.classList.remove('open');
    this._clearSearchResults();
    const inp = document.getElementById('tx-search-input');
    if (inp) { inp.value = ''; inp.blur(); }
  };
})();



/* ═══════════════════════════════════════════════════════════════
   PHASE 4 — RECURRING WIDGET  (patched onto Dashboard render)
   ═══════════════════════════════════════════════════════════════ */
(function patchDashRecurring() {
  const _origRender = Screens.dash.render.bind(Screens.dash);

  Screens.dash.render = function() {
    _origRender();

    // After dashboard renders, inject recurring widget before the stat-grid
    const content = document.getElementById('dash-content');
    if (!content) return;

    const recurring = RecurringDetector.detect(State.transactions);
    if (recurring.length === 0) return;

    const widget = document.createElement('div');
    widget.className = 'recur-card';
    widget.innerHTML = `
      <div class="sec-label" style="margin-bottom:8px">🔁 Monthly Subscriptions</div>
      ${recurring.map(r => {
        const cat  = CATS.get(r.catId);
        const soon = RecurringDetector.isDueSoon(r.nextDate);
        return `<div class="recur-row">
          <div class="recur-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="recur-body">
            <div class="recur-name">${escHtml(r.name)}</div>
            <div class="recur-freq">
              Monthly · ${r.monthCount} months
              ${soon ? `<span style="color:var(--og);font-weight:700"> · Due soon</span>` : `· Next ~${Utils.fmtDateShort(r.nextDate)}`}
            </div>
          </div>
          <div class="recur-amt">−${Utils.fmtAmt(r.amount)}</div>
        </div>`;
      }).join('')}
    `;

    // Insert after nw-card or after onboarding prompt
    const statGrid = content.querySelector('.stat-grid');
    if (statGrid) statGrid.parentNode.insertBefore(widget, statGrid);
    else content.appendChild(widget);
  };
})();


/* ═══════════════════════════════════════════════
   APP  (bootstrap & orchestration)
═══════════════════════════════════════════════ */
const App = {

  async boot() {
    try {
      await DB.open();
      await State.refresh();

      // Phase 4: load custom categories from DB and patch CATS
      const savedCats = await DB.getAll('categories');
      if (savedCats.length > 0) {
        CATS.getAll().length = 0;
        savedCats.forEach(c => CATS.getAll().push(c));
        CATS._byIdRef = {};
        savedCats.forEach(c => CATS._byIdRef[c.id] = c);
      }

      // Seed categories to DB on first run
      // (Phase 3 will allow editing, so we need them in DB)
      const existingCats = await DB.getAll('categories');
      if (existingCats.length === 0) {
        await DB.putBulk('categories', CATS.getAll());
      }

      // Phase 3: init reports (load budgets)
      await Screens.reports.init();

      // Phase 4: init PIN lock
      await PINLock.init();

      UI.buildNav();
      // Phase 2: set initial review badge count
      const unreviewedOnBoot = (await DB.getAll('transactions')).filter(t => t.status === 'unreviewed').length;
      UI.setBadge('review', unreviewedOnBoot);

      // Phase 4: show PIN screen if enabled
      if (PINLock.isSet()) {
        PINLock.show(() => this.navigate('dash'));
      } else {
        this.navigate('dash');
      }

    } catch (err) {
      console.error('[Fintrack] Boot error:', err);
      document.getElementById('dash-content').innerHTML = `
        <div class="empty-state" style="padding-top:80px">
          <div class="empty-icon">❌</div>
          <div class="empty-title">Failed to start</div>
          <div class="empty-body">${escHtml(err.message)}<br><br>
            Make sure you are in a modern browser with IndexedDB enabled.<br>
            Private / Incognito mode may block storage.
          </div>
        </div>`;
    }
  },

  navigate(screenId) {
    // Hide all screens
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    // Show target screen
    const el = document.getElementById(`screen-${screenId}`);
    if (!el) {
      /*
       * PHASE_2_HOOK: if a screen doesn't exist yet, show a placeholder.
       * When Phase 2 adds its DOM nodes, this branch is never hit.
       */
      console.warn('[Fintrack] Screen not found:', screenId);
      return;
    }
    el.classList.add('active');

    // Scroll to top
    document.getElementById('screen-wrap').scrollTop = 0;

    // Update nav highlighting
    State.activeScreen = screenId;
    UI.buildNav();

    // Render the screen
    this._renderScreen(screenId);
  },

  _renderScreen(screenId) {
    const renderer = {
      dash:     () => Screens.dash.render(),
      tx:       () => Screens.tx.render(),
      accs:     () => Screens.accs.render(),
      settings: () => Screens.settings.render(),
      import: () => Screens.import.render(),
      review: () => Screens.review.render(),
      reports: () => Screens.reports.render(),
    }[screenId];

    if (renderer) renderer();
  },

  /** Re-render whichever screen is currently active */
  rerender() {
    this._renderScreen(State.activeScreen);
  },

};

// ── Start ──────────────────────────────────────
App.boot();

</script>

<script>
if ('serviceWorker' in navigator) {
  // Must be registered immediately — controllerchange can fire before or during the load event
  // if skipWaiting + clients.claim() completes before load finishes
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        // Force-check for a new SW on every load, and again whenever the app is foregrounded
        reg.update();
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update();
        });
      })
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
