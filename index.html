<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fintrack">
<meta name="theme-color" content="#0B0B0E">
<link rel="manifest" href="manifest.json">
<title>Fintrack</title>
<style>

/* ─────────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────────── */
:root {
  --bg:     #0B0B0E;
  --s1:     #131318;
  --s2:     #1A1A22;
  --s3:     #21212C;
  --bd:     #242430;
  --bd2:    #2E2E3C;

  --ac:     #E8A64E;
  --ac-lo:  rgba(232,166,78,.14);
  --ac-xlo: rgba(232,166,78,.06);

  --tx:     #EDE9E3;
  --tx2:    #8E8C96;
  --tx3:    #4E4C58;

  --gn:     #32D74B;
  --gn-lo:  rgba(50,215,75,.14);
  --rd:     #FF375F;
  --rd-lo:  rgba(255,55,95,.14);
  --bl:     #0A84FF;
  --bl-lo:  rgba(10,132,255,.14);
  --og:     #FF9F0A;
  --og-lo:  rgba(255,159,10,.14);

  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 22px;
}

/* ─────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--tx);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  font-size: 16px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: none;
}

input, select, button, textarea {
  font-family: inherit; font-size: inherit;
  -webkit-appearance: none; appearance: none;
}
button { cursor: pointer; border: none; background: none; }

/* ─────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────── */
#app {
  display: flex; flex-direction: column;
  height: 100%; max-width: 480px; margin: 0 auto;
  position: relative;
}

#safe-top  { height: var(--safe-t); background: var(--bg); flex-shrink: 0; }

#screen-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(68px + var(--safe-b));
  scroll-behavior: smooth;
}

/* ─────────────────────────────────────────────
   BOTTOM NAVIGATION
   Phase 2 note: add entries to NAV_TABS array in JS;
   the DOM is regenerated automatically.
───────────────────────────────────────────── */
#bottom-nav {
  position: fixed; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: flex;
  background: rgba(11,11,14,.88);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-top: 1px solid var(--bd);
  padding-top: 8px;
  padding-bottom: calc(8px + var(--safe-b));
  z-index: 200;
}

.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 4px 0; cursor: pointer;
  transition: opacity .15s;
  position: relative;
}
.nav-item:active { opacity: .7; }

.nav-item svg {
  width: 24px; height: 24px;
  stroke: var(--tx3); fill: none;
  stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke .2s;
}
.nav-item .nav-label {
  font-size: 10px; font-weight: 500;
  color: var(--tx3); letter-spacing: .02em;
  transition: color .2s;
}
.nav-item.active svg    { stroke: var(--ac); }
.nav-item.active .nav-label { color: var(--ac); }

/* nav badge (used in Phase 2 for Review count) */
.nav-badge {
  position: absolute; top: 0; right: calc(50% - 22px);
  background: var(--rd); color: #fff;
  border-radius: 9px; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px; border: 2px solid var(--bg);
}

/* ─────────────────────────────────────────────
   SCREENS
───────────────────────────────────────────── */
.screen { display: none; padding: 16px; min-height: 100%; }
.screen.active { display: block; }

/* ─────────────────────────────────────────────
   SCREEN HEADER
───────────────────────────────────────────── */
.screen-hdr {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px; padding-top: 6px;
}
.screen-hdr-left { display: flex; flex-direction: column; gap: 2px; }
.screen-title    { font-size: 26px; font-weight: 800; letter-spacing: -.6px; }
.screen-sub      { font-size: 13px; color: var(--tx2); }

/* ─────────────────────────────────────────────
   CARDS
───────────────────────────────────────────── */
.card {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: var(--r-lg); padding: 16px; margin-bottom: 12px;
}
.card-sm { padding: 12px; border-radius: var(--r-md); }

/* ─────────────────────────────────────────────
   SECTION LABELS
───────────────────────────────────────────── */
.sec-label {
  font-size: 11px; font-weight: 700;
  color: var(--tx3); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 8px;
  padding-left: 2px;
}

/* ─────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 13px 20px;
  border-radius: var(--r-md); font-size: 15px; font-weight: 600;
  letter-spacing: -.1px; cursor: pointer; border: none;
  transition: transform .12s, opacity .15s;
}
.btn:active { transform: scale(.97); opacity: .85; }

.btn-primary   { background: var(--ac); color: #1a1000; }
.btn-secondary { background: var(--s2); color: var(--tx); border: 1px solid var(--bd2); }
.btn-danger    { background: var(--rd-lo); color: var(--rd); border: 1px solid rgba(255,55,95,.25); }
.btn-ghost     { background: transparent; color: var(--tx2); padding: 8px 12px; }
.btn-full      { width: 100%; }
.btn-sm        { padding: 9px 14px; font-size: 13px; border-radius: var(--r-sm); }

/* ─────────────────────────────────────────────
   ICON BUTTON
───────────────────────────────────────────── */
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  background: var(--s2); border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.icon-btn svg { width: 18px; height: 18px; stroke: var(--tx2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.icon-btn:active { opacity: .7; }

/* ─────────────────────────────────────────────
   STAT GRID (2-col)
───────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: var(--r-md); padding: 14px;
}
.stat-lbl  { font-size: 10px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-val  { font-size: 21px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.4px; }
.stat-hint { font-size: 11px; color: var(--tx3); margin-top: 4px; }

/* ─────────────────────────────────────────────
   NET WORTH HERO CARD
───────────────────────────────────────────── */
.nw-card {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: var(--r-xl); padding: 20px 20px 18px;
  margin-bottom: 12px; position: relative; overflow: hidden;
}
.nw-card::after {
  content: ''; position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(232,166,78,.18) 0%, transparent 65%);
  pointer-events: none;
}
.nw-lbl { font-size: 11px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .07em; }
.nw-val { font-size: 38px; font-weight: 900; letter-spacing: -1.5px; color: var(--ac); margin: 4px 0 2px; }
.nw-sub { font-size: 12px; color: var(--tx2); }

/* ─────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────── */
.progress { height: 5px; background: var(--bd2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

/* ─────────────────────────────────────────────
   MONTH NAVIGATOR
───────────────────────────────────────────── */
.month-nav {
  display: flex; align-items: center; gap: 8px;
}
.month-nav-btn {
  width: 34px; height: 34px; border-radius: var(--r-sm);
  background: var(--s2); border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; color: var(--tx2);
  flex-shrink: 0;
}
.month-nav-btn:active { opacity: .7; }

/* ─────────────────────────────────────────────
   FILTER TABS
───────────────────────────────────────────── */
.filter-row {
  display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px;
  margin-bottom: 16px; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 6px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
  white-space: nowrap; cursor: pointer;
  background: var(--s2); color: var(--tx2); border: 1px solid var(--bd);
  transition: all .15s;
}
.filter-chip.active {
  background: var(--ac-lo); color: var(--ac); border-color: rgba(232,166,78,.4);
}

/* ─────────────────────────────────────────────
   TRANSACTION LIST ITEM
───────────────────────────────────────────── */
.tx-list { padding: 4px 14px; }

.tx-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; cursor: pointer;
}
.tx-item:active { opacity: .7; }
.tx-item + .tx-item { border-top: 1px solid var(--bd); }

.tx-icon {
  width: 42px; height: 42px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.tx-body  { flex: 1; min-width: 0; }
.tx-name  { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta  { font-size: 11px; color: var(--tx2); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.tx-meta-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

.tx-right  { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
.tx-date   { font-size: 11px; color: var(--tx3); margin-top: 2px; }

.col-expense    { color: var(--rd); }
.col-income     { color: var(--gn); }
.col-investment { color: var(--bl); }
.col-transfer   { color: var(--tx2); }

/* ─────────────────────────────────────────────
   ACCOUNT CARD
───────────────────────────────────────────── */
.acc-card {
  border-radius: var(--r-lg); padding: 18px;
  margin-bottom: 10px; position: relative; overflow: hidden;
  cursor: pointer; border: 1px solid transparent;
}
.acc-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.07) 0%, transparent 55%);
  pointer-events: none;
}
.acc-type-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; opacity: .8;
}
.acc-name { font-size: 17px; font-weight: 700; margin-top: 4px; }
.acc-bal-lbl { font-size: 10px; font-weight: 700; opacity: .6; text-transform: uppercase; letter-spacing: .06em; margin-top: 14px; }
.acc-bal { font-size: 24px; font-weight: 900; letter-spacing: -.5px; }

/* ─────────────────────────────────────────────
   FORM ELEMENTS
───────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--tx2); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .06em;
}

.form-input, .form-select {
  width: 100%; background: var(--s2);
  border: 1px solid var(--bd2); border-radius: var(--r-md);
  padding: 14px 16px; font-size: 16px; color: var(--tx);
  outline: none; transition: border-color .2s;
}
.form-input:focus, .form-select:focus { border-color: var(--ac); }
.form-input::placeholder { color: var(--tx3); }
.form-select option { background: var(--s2); }

/* segmented control */
.segmented { display: flex; background: var(--s2); border: 1px solid var(--bd); border-radius: var(--r-md); padding: 3px; gap: 2px; }
.seg-btn { flex: 1; padding: 8px 4px; border-radius: 9px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--tx2); transition: all .2s; }
.seg-btn.active { background: var(--s3); color: var(--tx); box-shadow: 0 1px 4px rgba(0,0,0,.4); }

/* color swatches */
.swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: border-color .15s, transform .15s;
}
.swatch.active { border-color: #fff; transform: scale(1.15); }

/* ─────────────────────────────────────────────
   MODALS (bottom sheet)
───────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 300; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-sheet {
  width: 100%; max-width: 480px; margin: 0 auto;
  background: var(--s1);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--bd);
  padding-bottom: calc(20px + var(--safe-b));
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.32,.72,0,1);
  max-height: 92vh; overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 34px; height: 4px; background: var(--bd2);
  border-radius: 2px; margin: 12px auto 0;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-body  { padding: 4px 20px 0; }

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
#toast-root {
  position: fixed;
  top: calc(var(--safe-t) + 14px);
  left: 50%; transform: translateX(-50%);
  z-index: 900; pointer-events: none;
  display: flex; flex-direction: column; gap: 8px;
  width: calc(100% - 32px); max-width: 440px;
}
.toast {
  background: var(--s2); border: 1px solid var(--bd2);
  border-radius: var(--r-md); padding: 12px 16px;
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  animation: toast-in .28s ease;
}
@keyframes toast-in { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

/* ─────────────────────────────────────────────
   SPINNER
───────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--bd2); border-top-color: var(--ac);
  border-radius: 50%; animation: spin .65s linear infinite;
  display: inline-block; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 48px 24px; gap: 10px;
}
.empty-icon  { font-size: 46px; }
.empty-title { font-size: 18px; font-weight: 700; }
.empty-body  { font-size: 14px; color: var(--tx2); line-height: 1.55; }

/* ─────────────────────────────────────────────
   CANVAS CHARTS
───────────────────────────────────────────── */
canvas { display: block; }

/* ─────────────────────────────────────────────
   DIVIDER
───────────────────────────────────────────── */
.divider { height: 1px; background: var(--bd); margin: 12px 0; }

/* ─────────────────────────────────────────────
   SETTINGS ROW
───────────────────────────────────────────── */
.setting-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; cursor: pointer;
}
.setting-row + .setting-row { border-top: 1px solid var(--bd); }
.setting-row:active { opacity: .7; }
.setting-row-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
.setting-row-body { flex: 1; min-width: 0; }
.setting-row-title { font-size: 15px; font-weight: 600; }
.setting-row-sub   { font-size: 12px; color: var(--tx2); margin-top: 2px; }
.setting-row-right { color: var(--tx3); font-size: 18px; flex-shrink: 0; }

/* ─────────────────────────────────────────────
   PHASE PLACEHOLDER (screens not yet built)
───────────────────────────────────────────── */
.phase-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 50vh; text-align: center; gap: 10px; padding: 24px;
}
.phase-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--ac-lo); color: var(--ac);
  font-size: 12px; font-weight: 700; letter-spacing: .04em;
  margin-bottom: 6px;
}

/* bottom spacer */
.bottom-space { height: 12px; }

/* ─── Phase 2: Upload zone ───────────────────────────── */
.upload-zone {
  border: 2px dashed var(--bd2); border-radius: var(--r-lg);
  padding: 36px 20px; text-align: center; cursor: pointer;
  background: var(--s2); transition: border-color .2s, background .2s;
  position: relative;
}
.upload-zone:active, .upload-zone.drag-over {
  border-color: var(--ac); background: var(--ac-xlo);
}
.upload-zone-icon  { font-size: 44px; margin-bottom: 10px; }
.upload-zone-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.upload-zone-sub   { font-size: 13px; color: var(--tx2); }

/* ─── Phase 2: Step pills ────────────────────────────── */
.step-row { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bd2); transition: all .3s;
}
.step-dot.done    { background: var(--gn); }
.step-dot.current { width: 22px; border-radius: 4px; background: var(--ac); }
.step-line { flex: 1; height: 1px; background: var(--bd2); }

/* ─── Phase 2: Import bank row ───────────────────────── */
.bank-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-top: 1px solid var(--bd);
}
.bank-row:first-child { border-top: none; }
.bank-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.bank-name { font-size: 14px; font-weight: 600; }
.bank-types{ font-size: 12px; color: var(--tx2); margin-top: 2px; }

/* ─── Phase 2: Detected result card ─────────────────── */
.detect-card {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 16px; background: var(--s2);
  border: 1px solid var(--bd2); border-radius: var(--r-md);
  margin-bottom: 14px;
}
.detect-icon { font-size: 32px; flex-shrink: 0; }
.detect-label{ font-size: 11px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .06em; }
.detect-val  { font-size: 15px; font-weight: 700; margin-top: 2px; }
.detect-sub  { font-size: 12px; color: var(--tx2); margin-top: 4px; line-height: 1.5; }

/* ─── Phase 2: Review item ───────────────────────────── */
.review-item {
  background: var(--s1); border: 1px solid var(--bd2);
  border-radius: var(--r-lg); padding: 14px; margin-bottom: 10px;
  transition: opacity .3s, transform .3s;
}
.review-item.resolving { opacity: 0; transform: translateX(12px); }
.ri-raw  { font-size: 14px; font-weight: 700; color: var(--tx); margin-bottom: 2px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-meta { font-size: 12px; color: var(--tx2); margin-bottom: 12px; }
.ri-amt  { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }

/* ─── Phase 2: Mapping row ───────────────────────────── */
.map-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-top: 1px solid var(--bd);
}
.map-row:first-child { border-top: none; }
.map-icon  { font-size: 18px; flex-shrink: 0; }
.map-body  { flex: 1; min-width: 0; }
.map-name  { font-size: 14px; font-weight: 600; }
.map-pat   { font-size: 11px; color: var(--tx3); margin-top: 2px; font-family: monospace; }
.map-del   { font-size: 14px; color: var(--tx3); cursor: pointer; padding: 6px; flex-shrink: 0; }
.map-del:active { color: var(--rd); }

/* ─── Phase 2: Warning notice ────────────────────────── */
.warn-notice {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px 14px; border-radius: var(--r-md);
  background: var(--og-lo); border: 1px solid rgba(255,159,10,.2);
  margin-bottom: 12px;
}
.warn-notice-icon { font-size: 18px; flex-shrink: 0; }
.warn-notice-body { font-size: 13px; color: var(--tx2); line-height: 1.55; }
.warn-notice-title{ font-size: 13px; font-weight: 700; color: var(--og); margin-bottom: 3px; }

/* ═══ Phase 3: Reports Screen ═══════════════════════════════════ */
.report-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
  margin-bottom: 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.report-tabs::-webkit-scrollbar { display: none; }
.report-tab {
  padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  white-space: nowrap; cursor: pointer; flex-shrink: 0;

<script>
'use strict';

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const Utils = (() => {

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  /** Format INR amount, abbreviated for large values */
  function fmtAmt(n, opts = {}) {
    const { full = false, sign = false } = opts;
    const abs = Math.abs(n || 0);
    let str;
    if (full) {
      str = '₹' + abs.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    } else if (abs >= 1e7) {
      str = '₹' + (abs / 1e7).toFixed(2) + ' Cr';
    } else if (abs >= 1e5) {
      str = '₹' + (abs / 1e5).toFixed(2) + ' L';
    } else if (abs >= 1000) {
      str = '₹' + (abs / 1000).toFixed(1) + 'K';
    } else {
      str = '₹' + abs.toFixed(2);
    }
    const prefix = sign && n > 0 ? '+' : n < 0 ? '-' : '';
    return prefix + str;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  function fmtDateShort(iso) {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short'
    });
  }

  function monthLabel(ym) {
    // ym = "YYYY-MM"
    return new Date(ym + '-01T00:00:00').toLocaleDateString('en-IN', {
      month: 'long', year: 'numeric'
    });
  }

  function monthShort(ym) {
    return new Date(ym + '-01T00:00:00').toLocaleDateString('en-IN', {
      month: 'short'
    });
  }

  /** Shift a YYYY-MM string by delta months */
  function shiftMonth(ym, delta) {
    const [y, m] = ym.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    return d.toISOString().slice(0, 7);
  }

  /** Current month as "YYYY-MM" */
  function currentYM() {
    return new Date().toISOString().slice(0, 7);
  }

  /** Stable hash for deduplication in Phase 2 */
  function txHash(date, amount, description) {
    const key = `${date}|${Math.abs(parseFloat(amount) || 0).toFixed(2)}|${(description || '').trim().toUpperCase().slice(0, 40)}`;
    let h = 5381;
    for (let i = 0; i < key.length; i++) {
      h = ((h << 5) + h) + key.charCodeAt(i);
      h = h & h;
    }
    return (h >>> 0).toString(36);
  }

  function parseAmt(s) {
    if (s == null || s === '') return null;
    const v = parseFloat(String(s).replace(/[₹,\s]/g, ''));
    return isNaN(v) ? null : v;
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  return { uid, today, fmtAmt, fmtDate, fmtDateShort, monthLabel, monthShort, shiftMonth, currentYM, txHash, parseAmt, clamp };
})();


/* ═══════════════════════════════════════════════
   DATABASE  (IndexedDB abstraction)

   To add a new store in Phase 2, simply add its
   name to DB_STORES and call DB.open() again — the
   upgrade handler checks objectStoreNames before
   creating, so existing data is safe.
═══════════════════════════════════════════════ */
const DB = (() => {
  const DB_NAME    = 'FintrackDB';
  const DB_VERSION = 4;

  // ── Store catalogue ──────────────────────────
  // Phase 2 will add: 'hashes'
  // Phase 3 will add: 'report_configs'
  const DB_STORES = {
    accounts:    { keyPath: 'id' },
    transactions: {
      keyPath: 'id',
      indexes: [
        { name: 'by_date',    field: 'date' },
        { name: 'by_account', field: 'accountId' },
        // Phase 2 will use 'by_status' for unreviewed queue
        { name: 'by_status',  field: 'status' },
      ]
    },
    categories:  { keyPath: 'id' },
    // Phase 2 addition:
    // mappings: { keyPath: 'id', indexes: [{ name: 'by_pattern', field: 'patternKey', unique: true }] }
    // hashes:   { keyPath: 'h' }
    settings:    { keyPath: 'k' },
    // Phase 2 stores
    mappings:    {
      keyPath: 'id',
      indexes: [{ name: 'by_pattern', field: 'patternKey', unique: false }]
    },
    hashes:      { keyPath: 'h' },
    // Phase 3 store
    budgets:     { keyPath: 'id' },
  };

  let _db = null;

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        for (const [name, cfg] of Object.entries(DB_STORES)) {
          if (!db.objectStoreNames.contains(name)) {
            const store = db.createObjectStore(name, { keyPath: cfg.keyPath });
            for (const idx of (cfg.indexes || [])) {
              store.createIndex(idx.name, idx.field, { unique: idx.unique || false });
            }
          }
        }
      };

      req.onsuccess = (e) => { _db = e.target.result; resolve(); };
      req.onerror   = ()  => reject(req.error);
    });
  }

  function _tx(store, mode = 'readonly') {
    return _db.transaction(store, mode);
  }

  function getAll(store) {
    return new Promise((res, rej) => {
      const r = _tx(store).objectStore(store).getAll();
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  }

  function get(store, key) {
    return new Promise((res, rej) => {
      const r = _tx(store).objectStore(store).get(key);
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  }

  function put(store, value) {
    return new Promise((res, rej) => {
      const t = _tx(store, 'readwrite');
      t.objectStore(store).put(value);
      t.oncomplete = () => res();
      t.onerror    = () => rej(t.error);
    });
  }

  function putBulk(store, values) {
    return new Promise((res, rej) => {
      const t = _tx(store, 'readwrite');
      const os = t.objectStore(store);
      values.forEach(v => os.put(v));
      t.oncomplete = () => res(values.length);
      t.onerror    = () => rej(t.error);
    });
  }

  function remove(store, key) {
    return new Promise((res, rej) => {
      const t = _tx(store, 'readwrite');
      t.objectStore(store).delete(key);
      t.oncomplete = () => res();
      t.onerror    = () => rej(t.error);
    });
  }

  function clearStore(store) {
    return new Promise((res, rej) => {
      const t = _tx(store, 'readwrite');
      t.objectStore(store).clear();
      t.oncomplete = () => res();
      t.onerror    = () => rej(t.error);
    });
  }

  return { open, getAll, get, put, putBulk, remove, clearStore };
})();

/* ═══════════════════════════════════════════════
   CHARTS  (Canvas 2-D, no external library)
═══════════════════════════════════════════════ */
const Charts = (() => {

  /** Draw a donut chart on a <canvas> element.
   *  data = [{ value, color }]
   *  total = sum of values (pass separately so caller controls it)
   */
  function donut(canvasId, data, total) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 140;
    const H = canvas.offsetHeight || 140;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const cx = W / 2, cy = H / 2;
    const outerR = W * 0.42;
    const innerR = W * 0.27;

    if (!data || data.length === 0 || total === 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,.06)';
      ctx.lineWidth = outerR - innerR;
      ctx.stroke();
      return;
    }

    let start = -Math.PI / 2;
    for (const slice of data) {
      const angle = (slice.value / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, outerR, start, start + angle);
      ctx.closePath();
      ctx.fillStyle = slice.color;
      ctx.fill();
      start += angle;
    }

    // Donut hole
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.fillStyle = '#131318'; // matches --s1
    ctx.fill();
  }

  /** Vertical bar chart.
   *  data = [{ label, value, highlight }]
   */
  function bars(canvasId, data, accentColor = '#E8A64E') {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth  || 300;
    const H = canvas.offsetHeight || 100;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    if (!data || data.length === 0) return;

    const max    = Math.max(...data.map(d => d.value), 1);
    const labelH = 18;
    const chartH = H - labelH;
    const gutter = 6;
    const barW   = (W - gutter * (data.length + 1)) / data.length;

    data.forEach((item, i) => {
      const x  = gutter + i * (barW + gutter);
      const bh = (item.value / max) * chartH * 0.9;
      const y  = chartH - bh;

      // Bar
      const r = Math.min(4, barW / 2);
      ctx.fillStyle = item.highlight ? accentColor : 'rgba(232,166,78,.25)';
      roundRect(ctx, x, y, barW, bh, r);
      ctx.fill();

      // Label
      ctx.fillStyle = item.highlight ? '#EDE9E3' : '#4E4C58';
      ctx.font = `${Math.max(9, Math.min(11, barW * .55))}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(item.label, x + barW / 2, H - 4);
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    if (h < r * 2) r = h / 2;
    if (w < r * 2) r = w / 2;
    if (r <= 0 || h <= 0) { ctx.rect(x, y, w, h); return; }
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }


  /**
   * Phase 3: Multi-dataset LINE CHART
   * datasets = [{ label, data: number[], color }]
   * labels   = string[]  (x-axis)
   */
  function line(canvasId, datasets, labels) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 320;
    const H = canvas.offsetHeight || 140;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const PAD = { t: 12, r: 12, b: 22, l: 10 };
    const cW = W - PAD.l - PAD.r;
    const cH = H - PAD.t - PAD.b;
    if (!datasets || datasets.length === 0 || !labels || labels.length < 2) return;

    const allVals = datasets.flatMap(d => d.data);
    const maxV = Math.max(...allVals, 1);
    const n = labels.length;
    const xStep = cW / (n - 1);

    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const y = PAD.t + cH - (i / 4) * cH;
      ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W - PAD.r, y);
      ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = 1; ctx.stroke();
    }

    // X-axis labels
    ctx.fillStyle = '#4E4C58';
    ctx.font = `${Math.max(9, Math.min(11, xStep * .45))}px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    labels.forEach((lbl, i) => {
      ctx.fillText(lbl, PAD.l + i * xStep, H - 5);
    });

    // Lines
    datasets.forEach(ds => {
      if (!ds.data || ds.data.length < 2) return;
      ctx.beginPath();
      ds.data.forEach((v, i) => {
        const x = PAD.l + i * xStep;
        const y = PAD.t + cH - (v / maxV) * cH;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = ds.color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
      ctx.stroke();
      // Dots
      ds.data.forEach((v, i) => {
        const x = PAD.l + i * xStep;
        const y = PAD.t + cH - (v / maxV) * cH;
        ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = ds.color; ctx.fill();
      });
    });
  }

  /**
   * Phase 3: HORIZONTAL BARS
   * data = [{ label, value, color, icon? }]
   */
  function hbars(canvasId, data) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !data || data.length === 0) return;
    const dpr = window.devicePixelRatio || 1;
    const ROW_H = 28;
    const W = canvas.offsetWidth || 300;
    const H = data.length * ROW_H + 4;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const maxV = Math.max(...data.map(d => d.value), 1);
    const LABEL_W = 100;
    const BAR_W = W - LABEL_W - 50;

    data.forEach((item, i) => {
      const y = i * ROW_H + 2;
      const bw = (item.value / maxV) * BAR_W;
      // Bar
      roundRect(ctx, LABEL_W, y + 6, Math.max(bw, 2), 16, 4);
      ctx.fillStyle = item.color || '#E8A64E';
      ctx.fill();
      // Label
      ctx.fillStyle = '#EDE9E3'; ctx.font = '11px -apple-system,sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(item.label.slice(0, 14), LABEL_W - 6, y + 18);
      // Value
      ctx.textAlign = 'left';
      ctx.fillStyle = '#8E8C96';
      ctx.fillText('₹' + (item.value >= 1000 ? (item.value/1000).toFixed(1)+'K' : item.value.toFixed(0)), LABEL_W + bw + 6, y + 18);
    });
  }

  /**
   * Phase 3: GROUPED BAR CHART (2 datasets side-by-side)
   * datasets = [{ label, data: number[], color }]
   * labels   = string[]
   */
  function groupedBars(canvasId, datasets, labels) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 320;
    const H = canvas.offsetHeight || 130;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    if (!datasets || !labels || labels.length === 0) return;
    const allVals = datasets.flatMap(d => d.data);
    const maxV = Math.max(...allVals, 1);
    const labelH = 18;
    const cH = H - labelH;
    const n = labels.length;
    const groupW = W / n;
    const barW = groupW / (datasets.length + 1);
    const gap = barW / 2;

    // Grid
    for (let i = 1; i <= 3; i++) {
      const y = cH - (i / 4) * cH * .9;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y);
      ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = 1; ctx.stroke();
    }

    labels.forEach((lbl, gi) => {
      datasets.forEach((ds, di) => {
        const v = ds.data[gi] || 0;
        const bh = (v / maxV) * cH * 0.9;
        const x = gi * groupW + gap + di * (barW + 2);
        const y = cH - bh;
        roundRect(ctx, x, y, barW, bh, Math.min(3, barW / 2));
        ctx.fillStyle = ds.color; ctx.fill();
      });
      ctx.fillStyle = '#4E4C58';
      ctx.font = `${Math.max(8, Math.min(10, groupW * .35))}px -apple-system,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(lbl, gi * groupW + groupW / 2, H - 4);
    });
  }

  return { donut, bars, line, hbars, groupedBars };

})();

                      2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33
                      1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0
                      009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0
                      01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65
                      0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9
                      a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83
                      l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3
                      a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0

                      4h-.09a1.65 1.65 0 00-1.51 1z"/>`

  function buildNav() {
    const nav = document.getElementById('bottom-nav');
    nav.innerHTML = NAV_TABS.map(tab => `
      <div class="nav-item ${State.activeScreen === tab.id ? 'active' : ''}"

/** Render a single transaction row HTML string.
 *  Used by Dashboard (recent list) and Transactions screen.
 */
function renderTxRow(tx) {
  const cat  = CATS.get(tx.categoryId);
  const sign = tx.type === 'income' ? '+' : '−';
  const col  = { expense: 'col-expense', income: 'col-income', investment: 'col-investment', transfer: 'col-transfer' }[tx.type] || 'col-expense';

  // PHASE_2_HOOK: tx.status === 'unreviewed' → show warning badge on icon
  const unreviewedMark = tx.status === 'unreviewed'
    ? `<div style="position:absolute;top:-3px;right:-3px;width:12px;height:12px;
                   border-radius:50%;background:var(--og);border:2px solid var(--s1)"></div>`
    : '';

  return `
    <div class="tx-item" onclick="Screens.tx.openDetail('${tx.id}')">
      <div style="position:relative;flex-shrink:0">
        <div class="tx-icon" style="background:${cat.color}22">
          ${cat.icon}
        </div>
        ${unreviewedMark}
      </div>
      <div class="tx-body">
        <div class="tx-name">${escHtml(tx.merchant || tx.description)}</div>
        <div class="tx-meta">
          <div class="tx-meta-dot" style="background:${cat.color}"></div>
          <span>${escHtml(cat.name)}</span>
          ${tx.accountId ? `<span>·</span><span>${escHtml((State.accountById(tx.accountId) || { name: '?' }).name)}</span>` : ''}
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${col}">${sign}${Utils.fmtAmt(tx.amount)}</div>
        <div class="tx-date">${Utils.fmtDateShort(tx.date)}</div>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

Screens.tx = {

      .sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

    if (State.txFilter !== 'all') {

      } else {
        txs = txs.filter(t => t.type === State.txFilter);
      }

    const groups = {};
    txs.forEach(t => {
      groups[t.date] = groups[t.date] || [];
      groups[t.date].push(t);
    });
    const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    const unreviewedCount = State.txInMonth(ym).filter(t => t.status === 'unreviewed').length;

    document.getElementById('tx-content').innerHTML = `

        <div class="screen-hdr-left">

          <div class="screen-sub">${Utils.monthLabel(ym)}</div>
        </div>

  setFilter(f) {

    this.render();
  },

  // ─── Add Transaction Modal ──────────────────
  openAddModal(prefillAccountId = null) {
    const accOptions = State.accounts
      .map(a => `<option value="${a.id}" ${a.id === prefillAccountId ? 'selected' : ''}>${escHtml(a.name)}</option>`)
      .join('');

    const expCats  = CATS.byType('expense');
    const incCats  = CATS.byType('income');
    const invCats  = CATS.byType('investment');

    function catOpts(cats, defaultId) {
      return cats.map(c =>
        `<option value="${c.id}" ${c.id === defaultId ? 'selected' : ''}>${c.icon} ${escHtml(c.name)}</option>`
      ).join('');
    }

    document.getElementById('modal-tx-body').innerHTML = `
      <div class="form-group">
        <div class="segmented" id="tx-type-seg">
          <div class="seg-btn active" data-type="expense"  onclick="Screens.tx._switchType('expense', this)">Expense</div>
          <div class="seg-btn"       data-type="income"    onclick="Screens.tx._switchType('income', this)">Income</div>
          <div class="seg-btn"       data-type="investment" onclick="Screens.tx._switchType('investment', this)">Invest</div>
        </div>
        <input type="hidden" id="tx-type-val" value="expense">
      </div>

      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-input" id="tx-amount" type="number" inputmode="decimal" placeholder="0.00" min="0">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="tx-desc" type="text" placeholder="e.g. Swiggy order, Salary credit" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="tx-date" type="date" value="${Utils.today()}">
      </div>

      <div class="form-group">
        <label class="form-label">Account</label>
        <select class="form-select" id="tx-account">
          ${State.accounts.length === 0
            ? '<option value="">No accounts — add one first</option>'
            : `<option value="">— select account —</option>${accOptions}`}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="tx-category">
          ${catOpts(expCats, 'c-mx')}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input class="form-input" id="tx-notes" type="text" placeholder="Any extra detail">
      </div>

      <button class="btn btn-primary btn-full" onclick="Screens.tx.saveNew()">Add Transaction</button>
      <div style="height:12px"></div>
    `;

    // Store category options for type-switching
    this._catOpts = { expense: catOpts(expCats,'c-mx'), income: catOpts(incCats,'c-sl'), investment: catOpts(invCats,'c-iv') };

    UI.openModal('tx');
  },

  _switchType(type, el) {
    document.querySelectorAll('#tx-type-seg .seg-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tx-type-val').value = type;
    const catSel = document.getElementById('tx-category');
    if (catSel && this._catOpts) catSel.innerHTML = this._catOpts[type];
  },

  async saveNew() {
    const amount  = Utils.parseAmt(document.getElementById('tx-amount').value);
    const desc    = (document.getElementById('tx-desc').value || '').trim();
    const date    = document.getElementById('tx-date').value;
    const accId   = document.getElementById('tx-account').value;
    const catId   = document.getElementById('tx-category').value;
    const type    = document.getElementById('tx-type-val').value;
    const notes   = (document.getElementById('tx-notes').value || '').trim();

    if (!amount || amount <= 0) return UI.toast('Enter a valid amount', 'error');
    if (!desc)                  return UI.toast('Enter a description', 'error');
    if (!date)                  return UI.toast('Select a date', 'error');
    if (!accId)                 return UI.toast('Select an account', 'error');

    /*
     * PHASE_2_HOOK: run description through MerchantEngine.resolve() here.
     * If a match is found, override catId and merchant name.
     *
     *   const resolved = MerchantEngine.resolve(desc);
     *   if (resolved) {
     *     merchant = resolved.merchant;
     *     catId    = CATS.idFromName(resolved.category) || catId;
     *   }
     */
    // Phase 2: MerchantEngine resolution
    let merchant  = desc;
    let resolvedCat = null;
    {
      const r = MerchantEngine.resolve(desc);
      if (r) { merchant = r.merchant; resolvedCat = CATS.idFromName(r.category); }
    }
    if (resolvedCat && !document.getElementById('tx-category').dataset.userEdited) {
      catId = resolvedCat;
    }

    const tx = {
      id:          Utils.uid(),
      date,
      description: desc,
      merchant,
      categoryId:  catId,
      accountId:   accId,
      type,
      amount,
      notes,
      // Phase 2 fields (pre-populated for schema consistency):
      status:      'reviewed',  // Phase 2: 'unreviewed' when auto-imported
      source:      'manual',    // Phase 2: bank name when imported
      hash:        Utils.txHash(date, amount, desc),  // Phase 2: dedup key
    };

    await DB.put('transactions', tx);

    // Update account balance
    const acc = State.accountById(accId);
    if (acc) {
      const delta = (type === 'income') ? amount : -amount;
      acc.balance = (acc.balance || 0) + delta;
      await DB.put('accounts', acc);
    }

    State.transactions.push(tx);
    if (acc) {
      const idx = State.accounts.findIndex(a => a.id === accId);
      if (idx >= 0) State.accounts[idx] = acc;
    }

    UI.closeModal('tx');
    UI.toast('Transaction added', 'success');
    App.rerender();
  },

  // ─── Transaction Detail Modal ───────────────
  openDetail(txId) {
    const tx = State.txById(txId);
    if (!tx) return;

    const cat  = CATS.get(tx.categoryId);
    const acc  = State.accountById(tx.accountId);
    const sign = tx.type === 'income' ? '+' : '−';
    const col  = { expense: 'col-expense', income: 'col-income', investment: 'col-investment' }[tx.type] || '';

    const catOptions = CATS.getAll()
      .map(c => `<option value="${c.id}" ${c.id === tx.categoryId ? 'selected' : ''}>${c.icon} ${escHtml(c.name)}</option>`)

    `;

  },

  async _detailType(txId, type, el) {
    document.querySelectorAll('#dtl-type-seg .seg-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const tx = State.txById(txId);
    if (!tx) return;
    tx.type = type;
    await DB.put('transactions', tx);
  },

  async _detailCat(txId, catId) {
    const tx = State.txById(txId);
    if (!tx) return;
    tx.categoryId = catId;
    await DB.put('transactions', tx);
  },

  async _detailNotes(txId, notes) {
    const tx = State.txById(txId);
    if (!tx) return;
    tx.notes = notes;
    await DB.put('transactions', tx);
  },

  async _markReviewed(txId) {
    const tx = State.txById(txId);
    if (!tx) return;
    tx.status = 'reviewed';
    await DB.put('transactions', tx);
    UI.closeModal('txd');
    UI.toast('Marked as reviewed', 'success');
    App.rerender();
  },

  async _deleteTx(txId) {
    if (!confirm('Delete this transaction?')) return;
    const tx = State.txById(txId);
    if (!tx) return;

    // Reverse balance update
    if (tx.accountId) {
      const acc = State.accountById(tx.accountId);
      if (acc) {
        const delta = (tx.type === 'income') ? -tx.amount : tx.amount;
        acc.balance = (acc.balance || 0) + delta;
        await DB.put('accounts', acc);
        const idx = State.accounts.findIndex(a => a.id === tx.accountId);
        if (idx >= 0) State.accounts[idx] = acc;
      }
    }

    await DB.remove('transactions', txId);
    State.transactions = State.transactions.filter(t => t.id !== txId);

    UI.closeModal('txd');
    UI.toast('Transaction deleted', 'info');
    App.rerender();
  },
};

      mappings: State.mappings,
      budgets:  await DB.getAll('budgets'),

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `fintrack-backup-${Utils.today()}.json`;
    a.click();
    URL.revokeObjectURL(url);

  async importBackup(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;

    let data;
    try {
      data = JSON.parse(await file.text());
    } catch {
      return UI.toast('Invalid JSON file', 'error');
    }

    if (!data._version || !Array.isArray(data.accounts) || !Array.isArray(data.transactions)) {
      return UI.toast('Not a valid Fintrack backup', 'error');
    }

    const date = data._exportedAt ? new Date(data._exportedAt).toLocaleDateString('en-IN') : 'unknown date';
    if (!confirm(`Import backup from ${date}?\nThis will MERGE with your existing data.`)) return;

    let addedAcc = 0, addedTx = 0;
    for (const a of data.accounts) {
      if (!State.accounts.find(x => x.id === a.id)) {
        await DB.put('accounts', a);
        State.accounts.push(a);
        addedAcc++;
      }
    }
    for (const t of data.transactions) {
      if (!State.transactions.find(x => x.id === t.id || (t.hash && x.hash === t.hash))) {
        await DB.put('transactions', t);
        State.transactions.push(t);
        addedTx++;
      }
    }

    let addedMap = 0;
    for (const m of (data.mappings || [])) {
      if (!State.mappings.find(x => x.id === m.id || x.patternKey === m.patternKey)) {
        await DB.put('mappings', m);
        State.mappings.push(m);
        addedMap++;
      }
    }
    let addedBudgets = 0;
    for (const b of (data.budgets || [])) {
      await DB.put('budgets', b);
      addedBudgets++;
    }
    if (addedBudgets > 0) await Screens.reports.init();
    MerchantEngine.loadUserMappings(State.mappings);
    UI.toast(`Imported ${addedAcc} accounts, ${addedTx} transactions${addedMap > 0 ? ', ' + addedMap + ' mappings' : ''}`, 'success');
    App.rerender();
  },

  async deleteMapping(id) {
    if (!confirm('Delete this merchant rule?')) return;
    await DB.remove('mappings', id);
    State.mappings = State.mappings.filter(m => m.id !== id);
    let addedBudgets = 0;
    for (const b of (data.budgets || [])) {
      await DB.put('budgets', b);
      addedBudgets++;
    }
    if (addedBudgets > 0) await Screens.reports.init();
    MerchantEngine.loadUserMappings(State.mappings);
    UI.toast('Rule deleted', 'info');
    App.rerender();
  },

  async clearAllData() {
    if (!confirm('⚠️ Clear ALL data permanently?')) return;
    if (!confirm('This cannot be undone. Are you really sure?')) return;
    await DB.clearStore('accounts');
    await DB.clearStore('transactions');
    await DB.clearStore('settings');
    await DB.clearStore('mappings');
    await DB.clearStore('hashes');
    await DB.clearStore('budgets');
    State.mappings = [];
    Screens.reports._budgets = [];
    State.accounts     = [];
    State.transactions = [];
    UI.toast('All data cleared', 'info');
    App.rerender();
  },
};




/* ═══════════════════════════════════════════════════════════
   PHASE 2 — MERCHANT INTELLIGENCE ENGINE

   Resolution pipeline:
     1. User-defined mappings  (highest priority)
     2. Built-in dictionary    (specific patterns first)
     3. Fuzzy token match      (prefix of long tokens)
     4. null → unidentified, goes to Review Queue
   ═════════════════════════════════════════════════════════ */
const MerchantEngine = (() => {

  /*
   * DICTIONARY
   * Format: { p: string[], n: name, c: category, i: icon, b: brand }
   * ORDER IS CRITICAL — more specific entries before generic.
   * Sub-services of the same brand are listed BEFORE the parent catch-all.
   */
  const DICT = [
    // ── Swiggy ─────────────────────────────────────────────────
    { p:['SWIGGY INSTAMART','SWGY INST','INSTAMART','SWIGGY-INSTAMART'],
      n:'Swiggy Instamart', c:'Groceries',     i:'🛒', b:'Swiggy' },
    { p:['SWIGGY','SWGY','BUNDL TECH','BUNDL TECHNOLOGIES'],
      n:'Swiggy',           c:'Food Delivery', i:'🍔', b:'Swiggy' },

    // ── Zomato ─────────────────────────────────────────────────
    { p:['ZOMATO HYPERPURE','HYPERPURE'],
      n:'Zomato Hyperpure', c:'Groceries',     i:'🥬', b:'Zomato' },
    { p:['ZOMATO','ZOMTABL','ZOMT'],
      n:'Zomato',           c:'Food Delivery', i:'🍕', b:'Zomato' },

    // ── Zepto / Kirana ─────────────────────────────────────────
