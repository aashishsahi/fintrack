  // Flatten into lookup list for O(n) scan
  let _compiled = [];
  let _userMaps = [];

  function _compile() {
    _compiled = [];
    for (const entry of DICT) {
      for (const pat of entry.p) {
        _compiled.push({ pat: pat.toUpperCase(), n: entry.n, c: entry.c, i: entry.i, b: entry.b });
      }
    }
  }

  /**
   * Strip common UPI/bank prefixes so pattern matching works on the
   * meaningful part of a description.
   * e.g. "UPI/P2P/ZEPTO123456/KIRAANATECH" → "ZEPTO123456 KIRAANATECH"
   */
  function _clean(raw) {
    return (raw || '')
      .toUpperCase()
      .replace(/^(UPI[\s\-\/]|NEFT[\s\-\/]|RTGS[\s\-\/]|IMPS[\s\-\/]|P2P[\s\-\/]|P2M[\s\-\/]|ACH[\s\-\/]|INF[\s\-\/]|POS[\s\-\/])/g, '')
      .replace(/[\/\-_|]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  /** Resolve a raw bank description to a known merchant. Returns null if unknown. */
  function resolve(rawDescription) {
    if (!rawDescription) return null;
    const cleaned = _clean(rawDescription);
    const upper   = cleaned.toUpperCase();

    // 1. User-defined mappings (highest priority)
    for (const m of _userMaps) {
      if (upper.includes(m.patternKey.toUpperCase())) {
        return { merchant: m.merchantName, category: m.category, icon: m.icon || '🏷️', brand: m.parent || m.merchantName, src: 'user' };
      }
    }

    // 2. Dictionary — exact / substring match
    for (const e of _compiled) {
      if (upper.includes(e.pat)) {
        return { merchant: e.n, category: e.c, icon: e.i, brand: e.b, src: 'dict' };
      }
    }

    // 3. Fuzzy — match first 5+ chars of each token against known patterns
    const tokens = upper.split(/\s+/);
    for (const e of _compiled) {
      const patTokens = e.pat.trim().split(/\s+/);
      if (patTokens[0].length >= 5) {
        if (tokens.some(t => t.startsWith(patTokens[0].slice(0, 5)))) {
          return { merchant: e.n, category: e.c, icon: e.i, brand: e.b, src: 'fuzzy' };
        }
      }
    }

    return null; // → Review Queue
  }

  /** Load / reload user-defined mappings from DB into engine */
  function loadUserMappings(maps) {
    _userMaps = maps || [];
  }

  /** Full sorted list of known merchants (for Review Queue dropdown) */
  function getMerchantList() {
    const seen = new Set();
    const out  = [];
    for (const e of DICT) {
      if (!seen.has(e.n)) {
        seen.add(e.n);
        out.push({ name: e.n, category: e.c, icon: e.i, brand: e.b });
      }
    }
    return out.sort((a, b) => a.name.localeCompare(b.name));
  }

  /**
   * Extract a stable patternKey from a raw description.
   * This is what gets stored in the user mapping so future similar transactions
   * are auto-matched.
   */
  function extractPatternKey(rawDescription) {
    const cleaned = _clean(rawDescription);
    // Take first 3 meaningful tokens (skip purely numeric tokens)
    const tokens = cleaned.split(/\s+/).filter(t => /[A-Z]/.test(t)).slice(0, 3);
    return tokens.join(' ').slice(0, 32);
  }

  _compile();
  return { resolve, loadUserMappings, getMerchantList, extractPatternKey };
})();


/* ═══════════════════════════════════════════════════════════
   PHASE 2 — BANK STATEMENT PARSER

   Supports: HDFC Bank · HDFC CC · ICICI Bank · ICICI CC
             Axis Bank · SBI · Scapia CC · Generic fallback

   Each parser is a pure function: (rows, headers) → TxnRaw[]
   TxnRaw: { date, description, amount, type }
   ═════════════════════════════════════════════════════════ */
const BankParser = (() => {

  // ─── CSV tokeniser ────────────────────────────────────────
  function tokeniseCSV(text) {
    // Remove BOM
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (c === '"') {
        if (inQ && text[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else if ((c === '\n' || c === '\r') && !inQ) {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(cur.trim()); cur = '';
        if (row.some(v => v)) rows.push([...row]);
        row = [];
      } else {
        cur += c;
      }
    }
    if (cur || row.length) { row.push(cur.trim()); if (row.some(v => v)) rows.push(row); }
    return rows;
  }

  // ─── Find header row (skip account info lines at top) ─────
  function findHeaderRow(rows) {
    const KEYWORDS = /DATE|AMOUNT|DEBIT|CREDIT|NARRATION|DESCRIPTION|TRANSACTION|WITHDRAWAL|DEPOSIT|BALANCE|PARTICULARS|REMARK/;
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      const joined = rows[i].join('|').toUpperCase();
      if (KEYWORDS.test(joined) && rows[i].filter(c => c.trim()).length >= 3) return i;
    }
    return 0;
  }

  // ─── Date parser ─────────────────────────────────────────
  function pd(s) {
    if (!s) return null;
    s = s.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    let m;
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    const MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
    m = s.match(/^(\d{1,2})[\s\-]([A-Za-z]{3})[\s\-](\d{4})$/);
    if (m) { const mo = MONTHS[m[2].toLowerCase()]; if (mo) return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`; }
    m = s.match(/^([A-Za-z]{3})\s+(\d{1,2}),?\s+(\d{4})$/);
    if (m) { const mo = MONTHS[m[1].toLowerCase()]; if (mo) return `${m[3]}-${mo}-${m[2].padStart(2,'0')}`; }
    m = s.match(/^([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})$/);
    if (m) { const mo = MONTHS[m[1].toLowerCase()]; if (mo) return `${m[3]}-${mo}-${m[2].padStart(2,'0')}`; }
    const d = new Date(s);
    return isNaN(d.getTime()) ? null : d.toISOString().slice(0, 10);
  }

  // ─── Amount parser ───────────────────────────────────────
  function pa(s) {
    if (s == null || s === '') return null;
    const v = parseFloat(String(s).replace(/[₹,\s]/g, ''));
    return isNaN(v) ? null : v;
  }

  // ─── Column finder ───────────────────────────────────────
  function fi(hdrs, keywords) {
    const H = hdrs.map(h => h.toUpperCase().trim());
    return H.findIndex(h => keywords.some(k => h.includes(k)));
  }

  // ─── Common bank-account row builder ─────────────────────
  function bankRow(date, desc, debit, credit) {
    const rows = [];
    if (debit  && debit  > 0) rows.push({ date, description: desc, amount: debit,  type: 'expense' });
    if (credit && credit > 0) rows.push({ date, description: desc, amount: credit, type: 'income' });
    return rows;
  }

  // ─── AUTO-DETECT ─────────────────────────────────────────
  function detectBank(hdrs) {
    const H = hdrs.join('|').toUpperCase();
    if (H.includes('NARRATION') && H.includes('WITHDRAWAL') && H.includes('DEPOSIT'))
      return { bank: 'HDFC Bank', stmtType: 'savings', parseFn: parseHDFCBank };
    if (H.includes('TRANSACTION DETAILS') || (H.includes('AMOUNT') && H.includes('REWARD')))
      return { bank: 'HDFC Bank', stmtType: 'credit', parseFn: parseHDFCCredit };
    if ((H.includes('TRANSACTION REMARKS') || H.includes('S NO')) && H.includes('WITHDRAWAL'))
      return { bank: 'ICICI Bank', stmtType: 'savings', parseFn: parseICICIBank };
    if ((H.includes('SR. NO') || H.includes('SR.NO') || H.includes('SERIAL')) && H.includes('DOMESTIC'))
      return { bank: 'ICICI Bank', stmtType: 'credit', parseFn: parseICICICredit };
    if (H.includes('PARTICULARS') && (H.includes(' DR') || H.includes('DR ') || H.includes('|DR|')))
      return { bank: 'Axis Bank', stmtType: 'savings', parseFn: parseAxis };
    if (H.includes('TXN DATE') || (H.includes('VALUE DATE') && H.includes('REF NO')))
      return { bank: 'SBI', stmtType: 'savings', parseFn: parseSBI };
    // Scapia / single-amount credit card
    if (H.includes('DATE') && H.includes('DESCRIPTION') && H.includes('AMOUNT') && !H.includes('WITHDRAWAL'))
      return { bank: 'Scapia', stmtType: 'credit', parseFn: parseScapia };
    return { bank: 'Unknown', stmtType: 'savings', parseFn: parseGeneric };
  }

  // ─── HDFC Bank (Savings) ─────────────────────────────────
  // Date | Narration | Chq./Ref.No. | Value Dt | Withdrawal Amt. | Deposit Amt. | Closing Balance
  function parseHDFCBank(rows, hdrs) {
    const iD = fi(hdrs, ['DATE']);
    const iN = fi(hdrs, ['NARRATION', 'DESCRIPTION']);
    const iW = fi(hdrs, ['WITHDRAWAL', 'DEBIT']);
    const iC = fi(hdrs, ['DEPOSIT', 'CREDIT']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      out.push(...bankRow(date, (r[iN]||'').trim(), pa(r[iW]), pa(r[iC])));
    }
    return out;
  }

  // ─── HDFC Credit Card ─────────────────────────────────────
  // Date | Transaction Details | Reward Points | Intl.Amt | Amount(INR)
  function parseHDFCCredit(rows, hdrs) {
    const iD = fi(hdrs, ['DATE']);
    const iN = fi(hdrs, ['DESCRIPTION', 'DETAILS', 'TRANSACTION DETAILS', 'NARRATION', 'PARTICULARS']);
    const iA = fi(hdrs, ['AMOUNT(INR)', 'AMOUNT (INR)', 'AMOUNT', 'INR']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      const a = pa(r[iA]); if (!a) continue;
      out.push({ date, description: (r[iN]||'').trim(), amount: Math.abs(a), type: a < 0 ? 'income' : 'expense' });
    }
    return out;
  }

  // ─── ICICI Bank (Savings) ────────────────────────────────
  // S No. | Value Date | Transaction Date | Cheque No. | Transaction Remarks | Withdrawal | Deposit | Balance
  function parseICICIBank(rows, hdrs) {
    const iD = fi(hdrs, ['TRANSACTION DATE', 'POSTING DATE', 'DATE']);
    const iN = fi(hdrs, ['TRANSACTION REMARKS', 'REMARKS', 'DESCRIPTION', 'NARRATION']);
    const iW = fi(hdrs, ['WITHDRAWAL', 'DEBIT']);
    const iC = fi(hdrs, ['DEPOSIT', 'CREDIT']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      out.push(...bankRow(date, (r[iN]||'').trim(), pa(r[iW]), pa(r[iC])));
    }
    return out;
  }

  // ─── ICICI Credit Card ───────────────────────────────────
  // Sr. No | Transaction Date | Transaction Description | Domestic Amount (INR)
  function parseICICICredit(rows, hdrs) {
    const iD = fi(hdrs, ['TRANSACTION DATE', 'DATE']);
    const iN = fi(hdrs, ['TRANSACTION DESCRIPTION', 'DESCRIPTION', 'PARTICULARS']);
    const iA = fi(hdrs, ['DOMESTIC AMOUNT', 'AMOUNT', 'INR']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      const a = pa(r[iA]); if (!a) continue;
      out.push({ date, description: (r[iN]||'').trim(), amount: Math.abs(a), type: a < 0 ? 'income' : 'expense' });
    }
    return out;
  }

  // ─── Axis Bank ───────────────────────────────────────────
  // Tran Date | CHQNO | PARTICULARS | DR | CR | BAL
  function parseAxis(rows, hdrs) {
    const iD = fi(hdrs, ['TRAN DATE', 'DATE', 'TRANSACTION DATE']);
    const iN = fi(hdrs, ['PARTICULARS', 'DESCRIPTION', 'NARRATION']);
    const iW = fi(hdrs, ['DR', 'DEBIT', 'WITHDRAWAL']);
    const iC = fi(hdrs, ['CR', 'CREDIT', 'DEPOSIT']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      out.push(...bankRow(date, (r[iN]||'').trim(), pa(r[iW]), pa(r[iC])));
    }
    return out;
  }

  // ─── SBI ─────────────────────────────────────────────────
  // Txn Date | Value Date | Description | Ref No./Cheque No. | Debit | Credit | Balance
  function parseSBI(rows, hdrs) {
    const iD = fi(hdrs, ['TXN DATE', 'TRANSACTION DATE', 'DATE']);
    const iN = fi(hdrs, ['DESCRIPTION', 'NARRATION', 'PARTICULARS']);
    const iW = fi(hdrs, ['DEBIT', 'WITHDRAWAL', 'DR']);
    const iC = fi(hdrs, ['CREDIT', 'DEPOSIT', 'CR']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      out.push(...bankRow(date, (r[iN]||'').trim(), pa(r[iW]), pa(r[iC])));
    }
    return out;
  }

  // ─── Scapia / Generic single-amount CC ───────────────────
  // Date | Description | Amount  (positive = debit, negative = credit/refund)
  function parseScapia(rows, hdrs) {
    const iD = fi(hdrs, ['DATE', 'TRANSACTION DATE']);
    const iN = fi(hdrs, ['DESCRIPTION', 'MERCHANT', 'DETAILS', 'NARRATION', 'PARTICULARS']);
    const iA = fi(hdrs, ['AMOUNT', 'INR', 'TRANSACTION AMOUNT']);
    const iT = fi(hdrs, ['TYPE', 'CR/DR', 'DR/CR', 'DEBIT/CREDIT']);
    const out = [];
    for (const r of rows) {
      const date = pd(r[iD]); if (!date) continue;
      const a = pa(r[iA]); if (!a) continue;
      let type = 'expense';
      if (iT >= 0) {
        const t = (r[iT] || '').toUpperCase();
        if (t.includes('CR') || t.includes('CREDIT') || t.includes('REFUND')) type = 'income';
      } else if (a < 0) {
        type = 'income';
      }
      out.push({ date, description: (r[iN]||'').trim(), amount: Math.abs(a), type });
    }
    return out;
  }

  // ─── Generic fallback ────────────────────────────────────
  function parseGeneric(rows, hdrs) {
    const iD = fi(hdrs, ['DATE']);
    const iN = fi(hdrs, ['DESC', 'NARR', 'DETAIL', 'REMARK', 'PARTICULAR', 'PARTICULARS']);
    const iW = fi(hdrs, ['DEBIT', 'WITHDRAWAL', 'DR']);
    const iC = fi(hdrs, ['CREDIT', 'DEPOSIT', 'CR']);
    const iA = fi(hdrs, ['AMOUNT', 'AMT']);
    const out = [];
    for (const r of rows) {
      if (iD < 0) continue;
      const date = pd(r[iD]); if (!date) continue;
      const desc = (iN >= 0 ? r[iN] : r[1] || '').trim();
      const dr = iW >= 0 ? pa(r[iW]) : null;
      const cr = iC >= 0 ? pa(r[iC]) : null;
      const a  = iA >= 0 ? pa(r[iA]) : null;
      if (dr && dr > 0)  out.push({ date, description: desc, amount: dr, type: 'expense' });
      else if (cr && cr > 0) out.push({ date, description: desc, amount: cr, type: 'income' });
      else if (a)  out.push({ date, description: desc, amount: Math.abs(a), type: a > 0 ? 'expense' : 'income' });
    }
    return out;
  }

  // ─── Public API ──────────────────────────────────────────
  function parse(fileText) {
    const allRows = tokeniseCSV(fileText);
    if (allRows.length < 2) return { error: 'File appears empty or unreadable.', txns: [] };

    const hdrIdx = findHeaderRow(allRows);
    const hdrs   = allRows[hdrIdx];
    const data   = allRows.slice(hdrIdx + 1).filter(r => r.some(c => c.trim()));
    if (data.length === 0) return { error: 'No data rows found after header.', txns: [] };

    const det  = detectBank(hdrs);
    const txns = det.parseFn(data, hdrs).filter(t => t.date && t.amount > 0 && t.description.length > 0);

    return { bank: det.bank, stmtType: det.stmtType, txns, total: txns.length };
  }

  return { parse };
})();


/* ═══════════════════════════════════════════════════════════
   PDF PARSER — offline PDF statement extraction via PDF.js
   Supports: HDFC/ICICI/Axis/SBI savings + HDFC/ICICI/Axis/Scapia credit cards
   ═════════════════════════════════════════════════════════ */
const PDFParser = (() => {
  let _libLoaded = false;
  const PDFJS_SRC    = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  async function _load() {
    if (_libLoaded || window.pdfjsLib) { _libLoaded = true; return; }
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = PDFJS_SRC;
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
    _libLoaded = true;
  }

  // Promise handles for the password modal
  let _pwResolve = null, _pwReject = null;

  function _promptPassword(filename, isRetry) {
    document.getElementById('pdfpw-filename').textContent = filename;
    document.getElementById('pdfpw-error').style.display = isRetry ? '' : 'none';
    document.getElementById('pdfpw-input').value = '';
    document.getElementById('modal-pdfpw').classList.add('open');
    setTimeout(() => document.getElementById('pdfpw-input').focus(), 300);
    return new Promise((res, rej) => { _pwResolve = res; _pwReject = rej; });
  }

  function _pwSubmit() {
    const pw = document.getElementById('pdfpw-input').value;
    document.getElementById('modal-pdfpw').classList.remove('open');
    if (_pwResolve) { _pwResolve(pw); _pwResolve = _pwReject = null; }
  }

  function _pwCancel() {
    document.getElementById('modal-pdfpw').classList.remove('open');
    if (_pwReject) { _pwReject(new Error('cancelled')); _pwResolve = _pwReject = null; }
  }

  // Extract structured rows [{y, page, items:[{str,x,w}], text}] from all pages
  async function _getRows(file) {
    let password = undefined;

    while (true) {
      try {
        // Read a fresh ArrayBuffer each attempt — getDocument transfers (detaches) it to the worker
        const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer(), password }).promise;
        const all = [];
        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const tc   = await page.getTextContent();
          const items = tc.items
            .filter(i => i.str && i.str.trim())
            .map(i => ({ str: i.str.trim(), x: i.transform[4], y: i.transform[5], w: i.width || 0 }));

          // Group items into rows by y-coordinate (±3pt tolerance)
          const buckets = new Map();
          for (const it of items) {
            let key = null;
            for (const k of buckets.keys()) { if (Math.abs(k - it.y) <= 3) { key = k; break; } }
            if (key === null) { key = it.y; buckets.set(key, []); }
            buckets.get(key).push(it);
          }

          const rows = [...buckets.entries()]
            .sort(([a], [b]) => b - a)   // descending y = top-to-bottom
            .map(([y, its]) => {
              const sorted = [...its].sort((a, b) => a.x - b.x);
              return { y, page: p, items: sorted, text: sorted.map(i => i.str).join(' ') };
            })
            .filter(r => r.text.trim().length > 0);
          all.push(...rows);
        }
        return all;
      } catch (e) {
        if (e.name === 'PasswordException') {
          // isRetry = true when we already tried a password and it was wrong
          password = await _promptPassword(file.name, password !== undefined);
        } else {
          throw e;
        }
      }
    }
  }

  // ─── Parsers for date / amount strings ────────────────
  const MO = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  function _pd(s) {
    if (!s) return null;
    s = String(s).trim();
    let m;
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) { const y = m[3].length === 2 ? '20'+m[3] : m[3]; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
    m = s.match(/^(\d{1,2})[\s\-]([A-Za-z]{3})[\s\-](\d{4})$/);
    if (m) { const mo = MO[m[2].toLowerCase()]; if (mo) return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`; }
    m = s.match(/^([A-Za-z]{3})\s+(\d{1,2})[,\s]+(\d{4})$/);
    if (m) { const mo = MO[m[1].toLowerCase()]; if (mo) return `${m[3]}-${mo}-${m[2].padStart(2,'0')}`; }
    return null;
  }

  function _pa(s) {
    if (!s) return null;
    const v = parseFloat(String(s).replace(/[₹,\s]/g, ''));
    return isNaN(v) ? null : v;
  }

  // ─── Column helpers ────────────────────────────────────
  // Find the first row index whose text contains ≥ minMatch of the given keywords
  function _findHdrIdx(rows, keywords, minMatch) {
    const KW = keywords.map(k => k.toUpperCase());
    minMatch = minMatch || KW.length;
    for (let i = 0; i < Math.min(rows.length, 80); i++) {
      const u = rows[i].text.toUpperCase();
      if (KW.filter(k => u.includes(k)).length >= minMatch) return i;
    }
    return -1;
  }

  // Build column descriptors from a header row's items
  function _colRanges(hdrRow) {
    const its = hdrRow.items;
    return its.map((it, i) => ({
      name:    it.str.toUpperCase().trim(),
      xCenter: it.x + it.w / 2,
      xMin:    i === 0 ? -Infinity : (its[i-1].x + its[i-1].w + it.x) / 2,
      xMax:    i === its.length-1 ? Infinity : (it.x + it.w + its[i+1].x) / 2,
    }));
  }

  // Assign each item in a data row to the nearest column
  function _assign(cols, dataRow) {
    const r = {};
    for (const c of cols) r[c.name] = '';
    for (const it of dataRow.items) {
      const best = cols.reduce((a, b) =>
        Math.abs(a.xCenter - it.x) <= Math.abs(b.xCenter - it.x) ? a : b);
      r[best.name] = (r[best.name] + ' ' + it.str).trim();
    }
    return r;
  }

  // Return value of first column whose name includes any of the given keywords
  function _cv(d, ...keys) {
    const found = Object.keys(d).find(k => keys.some(kw => k.toUpperCase().includes(kw.toUpperCase())));
    return found ? d[found] : '';
  }

  const DATE_LINE_RE = /\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\b|\b\d{1,2}\s[A-Za-z]{3}\s\d{4}\b/;

  // ─── Bank detection ────────────────────────────────────
  function _detect(rows) {
    const head = rows.slice(0, 50).map(r => r.text).join(' ').toLowerCase();
    if (head.includes('hdfc bank') || head.includes('hdfcbank')) {
      if (head.includes('credit card') || head.includes('statement of credit'))
        return { bank:'HDFC Bank', stmtType:'credit', fn:_hdfcCredit };
      return { bank:'HDFC Bank', stmtType:'savings', fn:_hdfcSavings };
    }
    if (head.includes('icici bank')) {
      if (head.includes('credit card'))
        return { bank:'ICICI Bank', stmtType:'credit', fn:_iciciCredit };
      return { bank:'ICICI Bank', stmtType:'savings', fn:_iciciSavings };
    }
    if (head.includes('axis bank')) {
      if (head.includes('credit card'))
        return { bank:'Axis Bank', stmtType:'credit', fn:_axisCredit };
      return { bank:'Axis Bank', stmtType:'savings', fn:_axisSavings };
    }
    if (head.includes('state bank of india') || (head.includes('state bank') && head.includes('sbi')))
      return { bank:'SBI', stmtType:'savings', fn:_sbi };
    if (head.includes('scapia') || (head.includes('federal bank') && head.includes('credit card')))
      return { bank:'Scapia', stmtType:'credit', fn:_scapia };
    return { bank:'Unknown', stmtType:'savings', fn:_genericPDF };
  }

  // ─── HDFC Savings PDF ──────────────────────────────────
  // Date | Narration | Chq/Ref | Value Dt | Withdrawal Amt | Deposit Amt | Balance
  function _hdfcSavings(rows) {
    const hi = _findHdrIdx(rows, ['NARRATION','WITHDRAWAL','DEPOSIT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d    = _assign(cols, row);
      const date = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const desc = _cv(d,'NARRATION','DESCRIPTION');
      const dr   = _pa(_cv(d,'WITHDRAWAL','DR'));
      const cr   = _pa(_cv(d,'DEPOSIT','CR'));
      if (dr && dr > 0) txns.push({ date, description: desc, amount: dr, type:'expense' });
      if (cr && cr > 0) txns.push({ date, description: desc, amount: cr, type:'income' });
    }
    return txns;
  }

  // ─── HDFC Credit Card PDF ──────────────────────────────
  // Date | Transaction Description | Reward Pts | Intl Amt | Amount(INR)  [Cr suffix = refund]
  function _hdfcCredit(rows) {
    const hi = _findHdrIdx(rows, ['DATE','AMOUNT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d      = _assign(cols, row);
      const date   = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const amtStr = _cv(d,'AMOUNT');
      const amt    = _pa(amtStr.replace(/[Cc][Rr]|[Dd][Rr]/g,''));
      if (!amt) continue;
      const desc   = _cv(d,'DESCRIPTION','DETAILS','NARRATION','PARTICULAR');
      const isCr   = /\bCr\b/i.test(amtStr) || /CREDIT|REFUND|REVERSAL|CASHBACK/i.test(row.text);
      txns.push({ date, description: desc, amount: Math.abs(amt), type: isCr ? 'income' : 'expense' });
    }
    return txns;
  }

  // ─── ICICI Savings PDF ─────────────────────────────────
  // S No | Value Date | Transaction Date | Cheque No | Remarks | Withdrawal | Deposit | Balance
  function _iciciSavings(rows) {
    const hi = _findHdrIdx(rows, ['WITHDRAWAL','DEPOSIT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d       = _assign(cols, row);
      const dateStr = _cv(d,'TRANSACTION DATE','DATE');
      const date    = _pd(dateStr) || (() => { const m = row.text.match(DATE_LINE_RE); return m ? _pd(m[0]) : null; })();
      if (!date) continue;
      const desc = _cv(d,'REMARKS','NARRATION','DESCRIPTION');
      const dr   = _pa(_cv(d,'WITHDRAWAL'));
      const cr   = _pa(_cv(d,'DEPOSIT'));
      if (dr && dr > 0) txns.push({ date, description: desc, amount: dr, type:'expense' });
      if (cr && cr > 0) txns.push({ date, description: desc, amount: cr, type:'income' });
    }
    return txns;
  }

  // ─── ICICI Credit Card PDF ─────────────────────────────
  // Date | Transaction Description | Amount (INR)  [Dr/Cr suffix]
  function _iciciCredit(rows) {
    const hi = _findHdrIdx(rows, ['DATE','DESCRIPTION','AMOUNT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d      = _assign(cols, row);
      const date   = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const amtStr = _cv(d,'AMOUNT');
      const amt    = _pa(amtStr.replace(/[Cc][Rr]|[Dd][Rr]/g,''));
      if (!amt) continue;
      const desc   = _cv(d,'DESCRIPTION','NARRATION','PARTICULAR');
      const isCr   = /\bCr\b/i.test(amtStr) || /CREDIT|REFUND|REVERSAL|CASHBACK/i.test(row.text);
      txns.push({ date, description: desc, amount: Math.abs(amt), type: isCr ? 'income' : 'expense' });
    }
    return txns;
  }

  // ─── Axis Savings PDF ──────────────────────────────────
  // Tran Date | Chq No | PARTICULARS | DR | CR | Balance
  function _axisSavings(rows) {
    const hi = _findHdrIdx(rows, ['PARTICULARS','DR'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d    = _assign(cols, row);
      const date = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const desc = _cv(d,'PARTICULAR','NARRATION');
      const dr   = _pa(_cv(d,'DR','DEBIT','WITHDRAWAL'));
      const cr   = _pa(_cv(d,'CR','CREDIT','DEPOSIT'));
      if (dr && dr > 0) txns.push({ date, description: desc, amount: dr, type:'expense' });
      if (cr && cr > 0) txns.push({ date, description: desc, amount: cr, type:'income' });
    }
    return txns;
  }

  // ─── Axis Credit Card PDF ──────────────────────────────
  // Transaction Date | Transaction Details | Amount (INR)  [Dr/Cr]
  function _axisCredit(rows) {
    const hi = _findHdrIdx(rows, ['DATE','AMOUNT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d      = _assign(cols, row);
      const date   = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const amtStr = _cv(d,'AMOUNT');
      const amt    = _pa(amtStr.replace(/[Cc][Rr]|[Dd][Rr]/g,''));
      if (!amt) continue;
      const desc   = _cv(d,'DETAIL','DESCRIPTION','PARTICULAR','NARRATION');
      const isCr   = /\bCr\b/i.test(amtStr) || /CREDIT|REFUND|REVERSAL|CASHBACK/i.test(row.text);
      txns.push({ date, description: desc, amount: Math.abs(amt), type: isCr ? 'income' : 'expense' });
    }
    return txns;
  }

  // ─── SBI Savings PDF ───────────────────────────────────
  // Txn Date | Value Date | Description | Ref No | Debit | Credit | Balance
  function _sbi(rows) {
    const hi = _findHdrIdx(rows, ['DESCRIPTION','DEBIT','CREDIT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d       = _assign(cols, row);
      const dateStr = _cv(d,'TXN DATE','TRANSACTION DATE','DATE');
      const date    = _pd(dateStr) || (() => { const m = row.text.match(DATE_LINE_RE); return m ? _pd(m[0]) : null; })();
      if (!date) continue;
      const desc = _cv(d,'DESCRIPTION','NARRATION','PARTICULAR');
      const dr   = _pa(_cv(d,'DEBIT'));
      const cr   = _pa(_cv(d,'CREDIT'));
      if (dr && dr > 0) txns.push({ date, description: desc, amount: dr, type:'expense' });
      if (cr && cr > 0) txns.push({ date, description: desc, amount: cr, type:'income' });
    }
    return txns;
  }

  // ─── Scapia Credit Card PDF ────────────────────────────
  function _scapia(rows) {
    const hi = _findHdrIdx(rows, ['DATE','AMOUNT'], 2);
    if (hi < 0) return _genericPDF(rows);
    const cols = _colRanges(rows[hi]);
    const txns = [];
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      if (!DATE_LINE_RE.test(row.text)) continue;
      const d       = _assign(cols, row);
      const date    = _pd(_cv(d,'DATE'));
      if (!date) continue;
      const amtStr  = _cv(d,'AMOUNT');
      const amt     = _pa(amtStr.replace(/[Cc][Rr]|[Dd][Rr]/g,''));
      if (!amt) continue;
      const desc    = _cv(d,'DESCRIPTION','MERCHANT','DETAIL','NARRATION');
      const typeStr = _cv(d,'TYPE','DR','CR');
      const isCr    = /\bCr\b/i.test(amtStr) || /CR|CREDIT|REFUND/i.test(typeStr) || /REVERSAL|CASHBACK/i.test(row.text);
      txns.push({ date, description: desc, amount: Math.abs(amt), type: isCr ? 'income' : 'expense' });
    }
    return txns;
  }

  // ─── Generic PDF fallback ──────────────────────────────
  // Finds any row containing a date + amount and treats it as a transaction
  function _genericPDF(rows) {
    const txns = [];
    for (const row of rows) {
      const dateMatch = row.text.match(DATE_LINE_RE);
      if (!dateMatch) continue;
      const date = _pd(dateMatch[0]);
      if (!date) continue;
      const amounts = (row.text.match(/[\d,]+\.\d{2}/g) || [])
        .map(m => parseFloat(m.replace(/,/g,'')))
        .filter(v => v > 0);
      if (!amounts.length) continue;
      const desc = row.text.replace(DATE_LINE_RE,'').replace(/[\d,]+\.\d{2}/g,'').trim();
      txns.push({ date, description: desc || row.text, amount: amounts[0], type:'expense' });
    }
    return txns;
  }

  // ─── Public API ────────────────────────────────────────
  async function parse(file) {
    try { await _load(); }
    catch { return { error: 'Could not load PDF library. Check your internet connection and try again.', txns: [] }; }

    let rows;
    try { rows = await _getRows(file); }
    catch (e) {
      if (e.message === 'cancelled') return { cancelled: true, txns: [] };
      return { error: 'Could not read PDF: ' + e.message, txns: [] };
    }

    if (!rows.length) return { error: 'PDF has no extractable text. Scanned/image PDFs are not supported — please use a digital statement PDF.', txns: [] };

    const det  = _detect(rows);
    const txns = det.fn(rows).filter(t => t.date && t.amount > 0 && t.description.trim().length > 0);
    return { bank: det.bank, stmtType: det.stmtType, txns, total: txns.length };
  }

  return { parse, _pwSubmit, _pwCancel };
})();

Screens.import = {

  _session: null,   // holds parsed data between steps

  render() {
    document.getElementById('import-content').innerHTML = this._noAccountsWarning() + `

      <div class="screen-hdr">
        <div class="screen-hdr-left">
          <div class="screen-title">Import</div>
          <div class="screen-sub">Upload bank statements</div>
        </div>
      </div>

      <!-- Upload zone -->
      <div class="upload-zone" id="upload-zone"
           onclick="document.getElementById('csv-input').click()"
           ondragover="this.classList.add('drag-over');event.preventDefault()"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="this.classList.remove('drag-over');Screens.import.handleDrop(event)">
        <div class="upload-zone-icon">📄</div>
        <div class="upload-zone-title">Tap to upload bank statement</div>
        <div class="upload-zone-sub">HDFC · ICICI · Axis · SBI · Scapia</div>
        <div class="upload-zone-sub" style="margin-top:4px;font-size:11px;color:var(--tx3)">
          PDF &amp; CSV supported · Auto-detects bank · Duplicates skipped
        </div>
      </div>

      <div style="height:20px"></div>

      <!-- Supported formats -->
      <div class="sec-label">Supported Formats</div>
      <div class="card" style="padding:8px 16px">
        ${[
          ['HDFC Bank',  'Savings · Credit Card', '#0066b2'],
          ['ICICI Bank', 'Savings · Credit Card', '#f58220'],
          ['Axis Bank',  'Savings · Credit Card', '#97144d'],
          ['SBI',        'Savings Account',       '#22409a'],
          ['Scapia',     'Credit Card',           '#ff6b6b'],
        ].map(([bank, types, dot]) => `
          <div class="bank-row">
            <div class="bank-dot" style="background:${dot}"></div>
            <div>
              <div class="bank-name">${bank}</div>
              <div class="bank-types">${types}</div>
            </div>
          </div>`).join('')}
        <div style="padding:12px 0 4px;font-size:12px;color:var(--tx3);line-height:1.6">
          💡 Download PDF or CSV statements from your bank's app or net banking portal.<br>
          It's safe to re-upload — duplicate transactions are detected and skipped.
        </div>
      </div>

      <div class="bottom-space"></div>
    `;
  },

  _noAccountsWarning() {
    if (State.accounts.length > 0) return '';
    return `<div class="warn-notice">
      <div class="warn-notice-icon">⚠️</div>
      <div class="warn-notice-body">
        <div class="warn-notice-title">No accounts set up</div>
        Add at least one account before importing so transactions can be linked to it.
        <span style="color:var(--ac);cursor:pointer" onclick="App.navigate('accs')">Go to Accounts →</span>
      </div>
    </div>`;
  },

  handleDrop(event) {
    event.preventDefault();
    const file = event.dataTransfer.files[0];
    if (file) this._processFile(file);
  },

  handleFile(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (file) this._processFile(file);
  },

  async _processFile(file) {
    // Show spinner
    document.getElementById('import-content').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px">
        <div class="spinner" style="width:40px;height:40px;border-width:3px"></div>
        <div style="font-size:15px;font-weight:600">Parsing ${escHtml(file.name)}…</div>
      </div>`;

    try {
      const isPDF  = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
      const result = isPDF
        ? await PDFParser.parse(file)
        : BankParser.parse(await file.text());

      if (result.cancelled) { this.render(); return; }
      if (result.error || result.txns.length === 0) {
        UI.toast(result.error || 'No transactions found in file', 'error');
        this.render(); return;
      }

      // Run every transaction through MerchantEngine
      const enriched = result.txns.map(t => {
        const r = MerchantEngine.resolve(t.description);
        return {
          ...t,
          merchant:   r ? r.merchant  : null,
          icon:       r ? r.icon      : '❓',
          catName:    r ? r.category  : null,
          resolved:   !!r,
          hash:       Utils.txHash(t.date, t.amount, t.description),
        };
      });

      this._session = { filename: file.name, bank: result.bank, stmtType: result.stmtType, enriched };
      this._renderPreview();

    } catch (err) {
      UI.toast('Parse error: ' + err.message, 'error');
      console.error(err);
      this.render();
    }
  },

  _renderPreview() {
    const { filename, bank, stmtType, enriched } = this._session;

    const totalExpense = enriched.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const totalIncome  = enriched.filter(t => t.type === 'income').reduce((s, t)  => s + t.amount, 0);
    const unresolved   = enriched.filter(t => !t.resolved).length;
    const accOptions   = State.accounts.map(a =>
      `<option value="${a.id}">${escHtml(a.name)} — ${escHtml(a.bank)}</option>`).join('');

    const stmtLabel = stmtType === 'credit' ? 'Credit Card Statement' : 'Bank Statement';

    document.getElementById('import-content').innerHTML = `

      <div class="screen-hdr">
        <div class="screen-hdr-left">
          <div class="screen-title">Preview</div>
          <div class="screen-sub">${escHtml(filename)}</div>
        </div>
        <div class="icon-btn" onclick="Screens.import.render()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>

      <!-- Detection summary -->
      <div class="detect-card">
        <div class="detect-icon">🏦</div>
        <div>
          <div class="detect-label">${bank} · ${stmtLabel}</div>
          <div class="detect-val">${enriched.length} transactions found</div>
          <div class="detect-sub">
            Expenses ${Utils.fmtAmt(totalExpense)} &nbsp;·&nbsp; Income ${Utils.fmtAmt(totalIncome)}<br>
            ${unresolved > 0
              ? `<span style="color:var(--og)">⚠️ ${unresolved} unidentified — will go to Review Queue</span>`
              : `<span style="color:var(--gn)">✓ All merchants auto-identified</span>`}
          </div>
        </div>
      </div>

      <!-- Account selector -->
      <div class="card">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Import transactions to</label>
          <select class="form-select" id="import-account-sel">
            <option value="">— Select account —</option>
            ${accOptions}
          </select>
        </div>
      </div>

      <!-- Transaction preview (first 12) -->
      <div class="sec-label" style="margin-top:4px">Transaction Preview</div>
      <div class="card" style="padding:0">
        <div class="tx-list">
          ${enriched.slice(0, 12).map(t => `
            <div class="tx-item" style="cursor:default">
              <div class="tx-icon" style="background:${t.resolved ? '#ffffff10' : '#ff9f0a15'}">
                ${t.icon}
              </div>
              <div class="tx-body">
                <div class="tx-name" style="${!t.resolved ? 'color:var(--og)' : ''}">
                  ${t.resolved ? escHtml(t.merchant) : '⚠️ ' + escHtml(t.description.slice(0, 28))}
                </div>
                <div class="tx-meta">
                  <span>${t.catName || 'Untagged'}</span>
                  <span>·</span><span>${Utils.fmtDateShort(t.date)}</span>
                </div>
              </div>
              <div class="tx-right">
                <div class="tx-amount ${t.type === 'income' ? 'col-income' : 'col-expense'}">
                  ${t.type === 'income' ? '+' : '−'}${Utils.fmtAmt(t.amount)}
                </div>
              </div>
            </div>`).join('')}
          ${enriched.length > 12 ? `
            <div style="text-align:center;padding:12px;font-size:13px;color:var(--tx2)">
              + ${enriched.length - 12} more transactions
            </div>` : ''}
        </div>
      </div>

      <div style="height:16px"></div>
      <button class="btn btn-primary btn-full" id="confirm-import-btn"
              onclick="Screens.import.confirmImport()">
        Import ${enriched.length} Transactions
      </button>
      <div style="height:8px"></div>
      <button class="btn btn-secondary btn-full" onclick="Screens.import.render()">Cancel</button>
      <div class="bottom-space"></div>
    `;
  },

  async confirmImport() {
    const accountId = document.getElementById('import-account-sel').value;
    if (!accountId) return UI.toast('Select an account first', 'error');

    const btn = document.getElementById('confirm-import-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>  Importing…'; }

    const { enriched } = this._session;

    try {
      // ── Deduplication ──────────────────────────────────────
      const hashes = enriched.map(t => t.hash);
      const { dupes, newHashes } = await DB.checkHashes(hashes);

      const toInsert = [];
      enriched.forEach((t, i) => {
        if (dupes.has(hashes[i])) return;
        toInsert.push({
          id:          Utils.uid(),
          date:        t.date,
          description: t.description,
          merchant:    t.merchant || null,
          categoryId:  t.catName ? CATS.idFromName(t.catName) : 'c-mx',
          accountId,
          type:        t.type,
          amount:      t.amount,
          notes:       '',
          status:      t.resolved ? 'reviewed' : 'unreviewed',
          source:      this._session.bank,
          hash:        hashes[i],
        });
      });

      if (toInsert.length === 0) {
        UI.toast('All transactions are duplicates — nothing new to import', 'info');
        this.render(); return;
      }

      await DB.putBulk('transactions', toInsert);
      await DB.storeHashes(newHashes);
      State.transactions.push(...toInsert);

      const dupeCount       = enriched.length - toInsert.length;
      const unreviewedCount = toInsert.filter(t => t.status === 'unreviewed').length;
      this._session = null;

      document.getElementById('import-content').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;gap:10px;text-align:center;padding:24px">
          <div style="font-size:60px;margin-bottom:6px">✅</div>
          <div style="font-size:24px;font-weight:900;letter-spacing:-.5px">Import Complete</div>
          <div style="font-size:14px;color:var(--tx2);line-height:1.7;margin-top:4px">
            <span style="color:var(--gn);font-weight:700">${toInsert.length}</span> transactions added<br>
            ${dupeCount > 0 ? `<span style="color:var(--tx3)">${dupeCount} duplicates skipped</span><br>` : ''}
            ${unreviewedCount > 0
              ? `<span style="color:var(--og)">⚠️ ${unreviewedCount} need manual tagging</span>`
              : `<span style="color:var(--gn)">✓ All merchants auto-identified</span>`}
          </div>
          ${unreviewedCount > 0 ? `
            <button class="btn btn-primary" style="margin-top:18px" onclick="App.navigate('review')">
              Go to Review Queue →
            </button>` : ''}
          <button class="btn btn-secondary" style="margin-top:8px" onclick="App.navigate('dash')">
            Back to Dashboard
          </button>
        </div>`;

      UI.toast(`${toInsert.length} transactions imported`, 'success');

    } catch (err) {
      UI.toast('Import failed: ' + err.message, 'error');
      console.error(err);
      this.render();
    }
  },
};


/* ═══════════════════════════════════════════════════════════
   PHASE 2 — REVIEW QUEUE
   ═════════════════════════════════════════════════════════ */
Screens.review = {

  render() {
    const unreviewed = State.transactions
      .filter(t => t.status === 'unreviewed')
      .sort((a, b) => b.date.localeCompare(a.date));

    const content = document.getElementById('review-content');

    // Update nav badge
    UI.setBadge('review', unreviewed.length);

    content.innerHTML = `
      <div class="screen-hdr">
        <div class="screen-hdr-left">
          <div class="screen-title">Review Queue</div>
          <div class="screen-sub">${unreviewed.length} unidentified transaction${unreviewed.length !== 1 ? 's' : ''}</div>
        </div>
      </div>

      ${unreviewed.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">✨</div>
          <div class="empty-title">All caught up!</div>
          <div class="empty-body">Every transaction has been identified. Import more statements and any unknowns will appear here.</div>
        </div>
      ` : `
        <div class="warn-notice" style="margin-bottom:16px">
          <div class="warn-notice-icon">💡</div>
          <div class="warn-notice-body">
            Tag each transaction below. Checking <b>"apply to all similar"</b> creates a permanent rule — future imports will auto-tag matching transactions.
          </div>
        </div>
        <div id="review-list">
          ${unreviewed.map(t => this._renderItem(t)).join('')}
        </div>
      `}
      <div class="bottom-space"></div>
    `;
  },

  _renderItem(tx) {
    const acc = State.accountById(tx.accountId);
    const merchantList = MerchantEngine.getMerchantList();
    const catOptions   = CATS.getAll().map(c =>
      `<option value="${c.id}">${c.icon} ${escHtml(c.name)}</option>`).join('');
    const merchantOptions = merchantList.map(m =>
      `<option value="${escHtml(m.name)}|${escHtml(m.category)}|${m.icon}">
         ${m.icon} ${escHtml(m.name)} — ${escHtml(m.category)}
       </option>`).join('');

    return `
      <div class="review-item" id="ri-${tx.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="flex:1;min-width:0;padding-right:10px">
            <div class="ri-raw">${escHtml(tx.description)}</div>
            <div class="ri-meta">
              ${Utils.fmtDate(tx.date)}
              ${acc ? ` · ${escHtml(acc.name)}` : ''}
            </div>
          </div>
          <div class="ri-amt ${tx.type === 'income' ? 'col-income' : 'col-expense'}" style="flex-shrink:0">
            ${tx.type === 'income' ? '+' : '−'}${Utils.fmtAmt(tx.amount)}
          </div>
        </div>

        <!-- Merchant selector -->
        <div class="form-group">
          <label class="form-label">Merchant</label>
          <select class="form-select" id="rm-${tx.id}"
                  onchange="Screens.review._onMerchantChange('${tx.id}')">
            <option value="">— Select merchant —</option>
            ${merchantOptions}
            <option value="__new__">✏️ Add new merchant…</option>
          </select>
        </div>

        <!-- New merchant name (hidden until __new__ selected) -->
        <div class="form-group" id="rnew-${tx.id}" style="display:none">
          <label class="form-label">New Merchant Name</label>
          <input class="form-input" id="rnewname-${tx.id}" placeholder="e.g. Local Grocery Store" autocomplete="off">
        </div>

        <!-- Category (auto-filled from merchant, can override) -->
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="rc-${tx.id}">${catOptions}</select>
        </div>

        <!-- Apply to all similar -->
        <label style="display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer">
          <input type="checkbox" id="rall-${tx.id}"
                 style="width:18px;height:18px;accent-color:var(--ac);flex-shrink:0">
          <span style="font-size:13px;color:var(--tx2)">
            Apply to all similar untagged transactions
          </span>
        </label>

        <button class="btn btn-primary btn-full btn-sm" onclick="Screens.review.saveTag('${tx.id}')">
          ✓ Tag &amp; Continue
        </button>
      </div>`;
  },

  _onMerchantChange(txId) {
    const val    = document.getElementById(`rm-${txId}`).value;
    const newDiv = document.getElementById(`rnew-${txId}`);
    const catSel = document.getElementById(`rc-${txId}`);

    if (val === '__new__') {
      newDiv.style.display = 'block';
      return;
    }
    newDiv.style.display = 'none';

    if (val) {
      const [, catName] = val.split('|');
      const catId = CATS.idFromName(catName);
      if (catSel && catId) catSel.value = catId;
    }
  },

  async saveTag(txId) {
    const tx = State.txById(txId);
    if (!tx) return;

    const sel        = document.getElementById(`rm-${txId}`);
    const catSel     = document.getElementById(`rc-${txId}`);
    const applyAll   = document.getElementById(`rall-${txId}`).checked;
    const newNameEl  = document.getElementById(`rnewname-${txId}`);

    let merchantName, catId, icon;

    if (sel.value === '__new__' || !sel.value) {
      merchantName = (newNameEl ? newNameEl.value : '').trim();
      if (!merchantName) return UI.toast('Enter a merchant name', 'error');
      catId = catSel.value;
      icon  = '🏷️';
    } else {
      const [name, , ico] = sel.value.split('|');
      merchantName = name;
      catId        = catSel.value;
      icon         = ico || '🏷️';
    }

    if (!catId) return UI.toast('Select a category', 'error');

    // ── Build patternKey ────────────────────────────────────
    const patternKey = MerchantEngine.extractPatternKey(tx.description);

    // ── Save user mapping ───────────────────────────────────
    const mapping = {
      id:          Utils.uid(),
      patternKey,
      merchantName,
      category:    (CATS.get(catId) || {}).name || 'Miscellaneous',
      icon,
      parent:      merchantName,
      isUser:      true,
      createdAt:   Utils.today(),
    };
    await DB.put('mappings', mapping);
    State.mappings.push(mapping);
    MerchantEngine.loadUserMappings(State.mappings);

    // ── Update this transaction ─────────────────────────────
    tx.merchant   = merchantName;
    tx.categoryId = catId;
    tx.status     = 'reviewed';
    await DB.put('transactions', tx);

    // ── Optionally apply to all similar ────────────────────
    let appliedCount = 0;
    if (applyAll) {
      const pk = patternKey.toUpperCase();
      const similar = State.transactions.filter(t =>
        t.id !== txId &&
        t.status === 'unreviewed' &&
        MerchantEngine.extractPatternKey(t.description).toUpperCase().includes(pk.slice(0, 8))
      );
      for (const s of similar) {
        s.merchant   = merchantName;
        s.categoryId = catId;
        s.status     = 'reviewed';
        await DB.put('transactions', s);
        appliedCount++;
      }
    }

    // ── Animate item out, then re-render ───────────────────
    const el = document.getElementById(`ri-${txId}`);
    if (el) {
      el.classList.add('resolving');
      setTimeout(async () => {
        el.remove();
        const remaining = document.querySelectorAll('[id^="ri-"]').length;
        if (remaining === 0) this.render();
        else {
          // Update subtitle
          const sub = document.querySelector('#screen-review .screen-sub');
          if (sub) sub.textContent = `${remaining} unidentified transaction${remaining !== 1 ? 's' : ''}`;
        }
        UI.setBadge('review', remaining);
        if (appliedCount > 0) UI.toast(`Tagged ${1 + appliedCount} transactions`, 'success');
        else UI.toast('Transaction tagged', 'success');
      }, 320);
    }
  },
};

   PHASE 2 — DB EXTENSIONS (added to DB module functionality)
   ═════════════════════════════════════════════════════════ */
// Attach dedup helpers directly onto DB object after definition
DB.checkHashes = function(hashes) {
  return new Promise((resolve, reject) => {
    if (!hashes.length) return resolve({ dupes: new Set(), newHashes: [] });
    const dupes = new Set();
    const newHashes = [];
    // We need a read transaction first to check, but we open readwrite so we can store after
    const req = indexedDB.open('FintrackDB');
    req.onsuccess = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('hashes')) {
        db.close();
        return resolve({ dupes, newHashes: hashes });
      }
      const t  = db.transaction('hashes', 'readonly');
      const os = t.objectStore('hashes');
      let pending = hashes.length;
      hashes.forEach(h => {
        const r = os.get(h);
        r.onsuccess = () => {
          if (r.result) dupes.add(h); else newHashes.push(h);
          if (--pending === 0) { db.close(); resolve({ dupes, newHashes }); }
        };
        r.onerror = () => reject(r.error);
      });
    };
    req.onerror = () => reject(req.error);
  });
};

DB.storeHashes = function(hashes) {
  return new Promise((resolve, reject) => {
    if (!hashes.length) return resolve();
    const req = indexedDB.open('FintrackDB');
    req.onsuccess = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('hashes')) { db.close(); return resolve(); }
      const t  = db.transaction('hashes', 'readwrite');
      const os = t.objectStore('hashes');
      hashes.forEach(h => os.put({ h }));
      t.oncomplete = () => { db.close(); resolve(); };
      t.onerror    = () => reject(t.error);
    };
    req.onerror = () => reject(req.error);
  });
};



/* ═══════════════════════════════════════════════════════════════
   PHASE 3 — REPORT ENGINE
   Pure computation: filters transactions, aggregates, returns data.
   No DOM dependency — all outputs are plain JS objects.
   ═══════════════════════════════════════════════════════════════ */
const ReportEngine = (() => {

  /** Get all months in a trailing window ending at currentYM */
  function trailingMonths(n) {
    const months = [];
    for (let i = n - 1; i >= 0; i--) months.push(Utils.shiftMonth(Utils.currentYM(), -i));
    return months;
  }

  /** Filter transactions by date window + optional accountIds */
  function filterTx(months, accountIds = null) {
    const cutoff = Utils.shiftMonth(Utils.currentYM(), -(months - 1)) + '-01';
    const end    = Utils.currentYM() + '-31';
    let txs = State.transactions.filter(t => t.date >= cutoff && t.date <= end);
    if (accountIds && accountIds.length) txs = txs.filter(t => accountIds.includes(t.accountId));
    return txs;
  }

  function sum(txs) { return txs.reduce((s, t) => s + t.amount, 0); }

  /** Monthly summary rows for last N months */
  function monthlySummary(months, accountIds = null) {
    return trailingMonths(months).map(ym => {
      const s = ym + '-01', e = ym + '-31';
      let txs = State.transactions.filter(t => t.date >= s && t.date <= e);
      if (accountIds && accountIds.length) txs = txs.filter(t => accountIds.includes(t.accountId));
      const expense    = sum(txs.filter(t => t.type === 'expense'));
      const income     = sum(txs.filter(t => t.type === 'income'));
      const investment = sum(txs.filter(t => t.type === 'investment'));
      const savings    = income - expense - investment;
      const savingsRate = income > 0 ? (savings / income * 100) : 0;
      return { ym, label: Utils.monthShort(ym), expense, income, investment, savings, savingsRate };
    });
  }

  /** Category breakdown for N months */
  function categoryBreakdown(months, type = 'expense', accountIds = null) {
    const txs = filterTx(months, accountIds).filter(t => t.type === type);
    const map = {};
    txs.forEach(t => {
      const id = t.categoryId;
      map[id] = map[id] || { id, amount: 0, count: 0 };
      map[id].amount += t.amount;
      map[id].count++;
    });
    const total = sum(txs);
    return { rows: Object.values(map).sort((a, b) => b.amount - a.amount), total };
  }

  /** Top merchants for N months */
  function topMerchants(months, limit = 15, accountIds = null) {
    const txs = filterTx(months, accountIds).filter(t => t.type === 'expense');
    const map = {};
    txs.forEach(t => {
      const key = t.merchant || t.description;
      if (!key) return;
      if (!map[key]) {
        const catId = t.categoryId;
        map[key] = { name: key, catId, amount: 0, count: 0 };
      }
      map[key].amount += t.amount;
      map[key].count++;
    });
    const total = sum(txs);
    return {
      rows: Object.values(map).sort((a, b) => b.amount - a.amount).slice(0, limit),
      total
    };
  }

  /** Investment summary */
  function investmentSummary(months, accountIds = null) {
    const txs = filterTx(months, accountIds).filter(t => t.type === 'investment');
    const { rows, total } = (() => {
      const map = {};
      txs.forEach(t => {
        const id = t.categoryId;
        map[id] = map[id] || { id, amount: 0, count: 0 };
        map[id].amount += t.amount;
        map[id].count++;
      });
      return { rows: Object.values(map).sort((a, b) => b.amount - a.amount), total: sum(txs) };
    })();
    const monthly = trailingMonths(months).map(ym => {
      const s = ym + '-01', e = ym + '-31';
      let m = txs.filter(t => t.date >= s && t.date <= e);
      return { ym, label: Utils.monthShort(ym), amount: sum(m) };
    });
    return { rows, total, monthly };
  }

  /** Budget status for current month */
  function budgetStatus(budgets) {
    const ym = Utils.currentYM();
    const txs = State.transactions.filter(t => t.date >= ym + '-01' && t.date <= ym + '-31' && t.type === 'expense');
    return budgets.map(b => {
      const spent = sum(txs.filter(t => t.categoryId === b.id));
      const pct   = b.limit > 0 ? Math.min(spent / b.limit * 100, 100) : 0;
      return { ...b, spent, pct, over: spent > b.limit };
    });
  }

  /** Smart insights from transaction data */
  function insights(months) {
    const rows = monthlySummary(months);
    const tips = [];
    const cur  = rows[rows.length - 1];
    const prev = rows[rows.length - 2];

    if (cur && prev && prev.expense > 0) {
      const delta = ((cur.expense - prev.expense) / prev.expense * 100);
      if (delta > 15) tips.push({ icon: '📈', title: 'Spending up', body: `Expenses rose ${delta.toFixed(0)}% vs last month (${Utils.fmtAmt(cur.expense)} vs ${Utils.fmtAmt(prev.expense)}).` });
      if (delta < -15) tips.push({ icon: '📉', title: 'Spending down', body: `Expenses dropped ${Math.abs(delta).toFixed(0)}% vs last month. Great discipline!` });
    }
    if (cur && cur.savingsRate >= 30) tips.push({ icon: '🏆', title: 'Strong savings', body: `Your savings rate this month is ${cur.savingsRate.toFixed(0)}%. Well above the 20% benchmark.` });
    if (cur && cur.savingsRate > 0 && cur.savingsRate < 10 && cur.income > 0)
      tips.push({ icon: '⚠️', title: 'Low savings rate', body: `You saved only ${cur.savingsRate.toFixed(0)}% this month. Try reducing discretionary spend.` });

    const avgExpense = rows.length ? rows.reduce((s, r) => s + r.expense, 0) / rows.length : 0;
    if (cur && avgExpense > 0 && cur.expense > avgExpense * 1.2)
      tips.push({ icon: '🔔', title: 'Above average spend', body: `This month's expenses are ${((cur.expense/avgExpense-1)*100).toFixed(0)}% above your ${months}-month average.` });

    if (tips.length === 0) tips.push({ icon: '✨', title: 'Looking good', body: 'No unusual patterns detected. Keep tracking to unlock more insights.' });
    return tips.slice(0, 3);
  }

  return { monthlySummary, categoryBreakdown, topMerchants, investmentSummary, budgetStatus, insights };
})();

      await DB.put('budgets', entry);
    } else {
      await DB.remove('budgets', catId);
    }
    // Re-render just the budgets tab if active
    if (this._tab === 'budgets') {
      const body = document.getElementById('report-body');

  exportCSV(type) {
    const accFilter = this._accId ? [this._accId] : null;
    let csvRows = [];

    if (type === 'spending') {
      const { rows, total } = ReportEngine.categoryBreakdown(this._months, 'expense', accFilter);
      csvRows = [['Category', 'Amount', 'Percentage'], ...rows.map(r => {
        const cat = CATS.get(r.id);
        return [cat.name, r.amount.toFixed(2), (total>0?r.amount/total*100:0).toFixed(1)+'%'];
      })];
    } else if (type === 'trends' || type === 'savings') {
      const rows = ReportEngine.monthlySummary(this._months, accFilter);
      csvRows = [['Month', 'Income', 'Expenses', 'Investments', 'Savings', 'Savings Rate'],
        ...rows.map(r => [r.label, r.income.toFixed(2), r.expense.toFixed(2), r.investment.toFixed(2), r.savings.toFixed(2), r.savingsRate.toFixed(1)+'%'])];
    } else if (type === 'merchants') {
      const { rows } = ReportEngine.topMerchants(this._months, 50, accFilter);
      csvRows = [['Rank', 'Merchant', 'Category', 'Transactions', 'Total Amount'],
        ...rows.map((r, i) => [i+1, r.name, CATS.get(r.catId).name, r.count, r.amount.toFixed(2)])];
    } else if (type === 'investments') {
      const { rows } = ReportEngine.investmentSummary(this._months, accFilter);
      csvRows = [['Category', 'Amount', 'Transactions'],
        ...rows.map(r => [CATS.get(r.id).name, r.amount.toFixed(2), r.count])];
    }

    if (!csvRows.length) return UI.toast('No data to export', 'info');

    const csv  = csvRows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `fintrack-${type}-${Utils.today()}.csv`;
    a.click(); URL.revokeObjectURL(url);
    UI.toast('CSV exported', 'success');
  },
};



/* ═══════════════════════════════════════════════════════════════
   PHASE 4 — PIN LOCK
   PIN stored as SHA-256(pin + salt) in the 'settings' DB store.
   ═══════════════════════════════════════════════════════════════ */
const PINLock = (() => {
  const SALT    = 'fintrack_pin_v1';
  const DB_KEY  = 'pin_hash';
  let   _hash   = null;
  let   _entry  = '';
  let   _mode   = 'verify';  // 'verify' | 'set-new' | 'confirm-new'
  let   _pending = '';       // stores first entry during set flow
  let   _onUnlock = null;

  async function _sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function init() {
    const row = await DB.get('settings', DB_KEY);
    _hash = row ? row.v : null;
  }

  function isSet() { return !!_hash; }

  /** Show lock screen; calls callback on successful unlock */
  function show(onUnlock) {
    _onUnlock = onUnlock;
    _entry = ''; _mode = 'verify'; _pending = '';
    document.getElementById('pin-sub').textContent = 'Enter your PIN';
    _refreshDots();
    document.getElementById('pin-overlay').style.display = 'flex';
  }

  function hide() {
    document.getElementById('pin-overlay').style.display = 'none';
  }

  function _refreshDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('pd-' + i);
      d.classList.toggle('filled', i < _entry.length);
      d.classList.remove('error');
    }
  }

  function _keyPress(digit) {
    if (_entry.length >= 4) return;
    _entry += digit;
    _refreshDots();
    if (_entry.length === 4) setTimeout(_submit, 120);
  }

  function _delete() {
    if (_entry.length > 0) { _entry = _entry.slice(0, -1); _refreshDots(); }
  }

  async function _submit() {
    const h = await _sha256(_entry + SALT);

    if (_mode === 'verify') {
      if (h === _hash) {
        hide();
        if (_onUnlock) _onUnlock();
      } else {
        _shakeError('Wrong PIN — try again');
      }

    } else if (_mode === 'set-new') {
      _pending = _entry;
      _entry   = '';
      _mode    = 'confirm-new';
      document.getElementById('pin-sub').textContent = 'Confirm new PIN';
      _refreshDots();

    } else if (_mode === 'confirm-new') {
      const ph = await _sha256(_pending + SALT);
      if (h === ph) {
        _hash = h;
        await DB.put('settings', { k: DB_KEY, v: h });
        hide();
        UI.toast('PIN set successfully', 'success');
        App.rerender();
      } else {
        _shakeError("PINs don't match — start again");
        _mode = 'set-new'; _pending = '';
      }
    }
  }

  function _shakeError(msg) {
    for (let i = 0; i < 4; i++) document.getElementById('pd-' + i).classList.add('error');
    const dots = document.getElementById('pin-dots');
    dots.classList.add('shake');
    document.getElementById('pin-sub').textContent = msg;
    setTimeout(() => { dots.classList.remove('shake'); _entry = ''; _refreshDots(); }, 600);
  }

  function _biometric() {
    // Decorative on web — show friendly message
    UI.toast('Use your PIN to unlock', 'info');
  }

  /** Start PIN-set flow from Settings */
  function startSetFlow() {
    _entry = ''; _mode = 'set-new'; _pending = '';
    _onUnlock = null;
    document.getElementById('pin-sub').textContent = 'Choose a 4-digit PIN';
    _refreshDots();
    document.getElementById('pin-overlay').style.display = 'flex';
  }

  async function remove() {
    _hash = null;
    await DB.remove('settings', DB_KEY);
    UI.toast('PIN removed', 'info');
    App.rerender();
  }

  return { init, isSet, show, hide, startSetFlow, remove, _keyPress, _delete, _biometric };
})();


/* ═══════════════════════════════════════════════════════════════
   PHASE 4 — RECURRING TRANSACTION DETECTOR
   Scans all transactions, groups by merchant/description,
   and flags those appearing in 2+ months with consistent amounts.
   ═══════════════════════════════════════════════════════════════ */
const RecurringDetector = (() => {

  /** Returns top recurring charges sorted by amount desc */
  function detect(transactions, limit = 6) {
    const expenses = transactions.filter(t => t.type === 'expense');
    if (expenses.length < 3) return [];

    // Group by normalised merchant name
    const groups = {};
    expenses.forEach(t => {
      const key = (t.merchant || t.description || '').trim().toLowerCase();
      if (!key) return;
      groups[key] = groups[key] || { key, txs: [] };
      groups[key].txs.push(t);
    });

    const recurring = [];

    for (const grp of Object.values(groups)) {
      const txs = grp.txs;
      // Need transactions in at least 2 distinct months
      const months = new Set(txs.map(t => t.date.slice(0, 7)));
      if (months.size < 2) continue;

      // Amount consistency check: coefficient of variation < 15%
      const amounts  = txs.map(t => t.amount);
      const mean     = amounts.reduce((s, a) => s + a, 0) / amounts.length;
      const variance = amounts.map(a => (a - mean) ** 2).reduce((s, v) => s + v, 0) / amounts.length;
      const cv       = mean > 0 ? Math.sqrt(variance) / mean : 1;
      if (cv > 0.15) continue;

      // Find last transaction and estimate next date
      const sorted   = [...txs].sort((a, b) => b.date.localeCompare(a.date));
      const lastDate = sorted[0].date;
      const nextDate = _estimateNext(lastDate);

      recurring.push({
        key:        grp.key,
        name:       sorted[0].merchant || sorted[0].description,
        catId:      sorted[0].categoryId,
        amount:     mean,
        lastDate,
        nextDate,
        monthCount: months.size,
        totalSpent: txs.reduce((s, t) => s + t.amount, 0),
      });
    }

    return recurring
      .sort((a, b) => b.amount - a.amount)
      .slice(0, limit);
  }

  function _estimateNext(lastDateISO) {
    const d = new Date(lastDateISO + 'T00:00:00');
    d.setMonth(d.getMonth() + 1);
    return d.toISOString().slice(0, 10);
  }

  function isDueSoon(nextDateISO) {
    const today = new Date();
    const next  = new Date(nextDateISO + 'T00:00:00');
    const diff  = (next - today) / 86400000;
    return diff >= 0 && diff <= 7;
  }

  return { detect, isDueSoon };
})();

  // ── Category List ─────────────────────────────────────────────
